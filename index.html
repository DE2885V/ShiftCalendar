<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Учет смен</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { primary: '#3b82f6' } } }
        }
    </script>
    
    <style>
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 0;
            height: 100vh;
            overflow-x: hidden;
            transition: background-color 0.3s, color 0.3s;
        }
        body { background-color: #f3f4f6; color: #111827; }
        body.dark { background-color: #111827; color: #f9fafb; }
        
        .animate-slide-up { animation: slideUp 0.3s ease-out forwards; }
        @keyframes slideUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        
        .day-selected { box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.5); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // --- Helpers ---
        const formatHeader = (start, end) => {
            const months = ["Январь", "Февраль", "Март", "Апрель", "Май", "Июнь", "Июль", "Август", "Сентябрь", "Октябрь", "Ноябрь", "Декабрь"];
            if (start.getMonth() === end.getMonth()) return `${months[start.getMonth()]} ${start.getFullYear()}`;
            return `${start.getDate()} ${months[start.getMonth()]} - ${end.getDate()} ${months[end.getMonth()]}`;
        };

        // --- Компонент: Модальное окно смены ---
        const ShiftModal = ({ show, onClose, date, shift, payment, bonus, onSave, templates }) => {
            const [hours, setHours] = useState(shift?.hours || '');
            const [rate, setRate] = useState(shift?.rate || '');
            const [note, setNote] = useState(shift?.note || '');
            const [color, setColor] = useState(shift?.color || '#3b82f6');
            
            const [moneyIn, setMoneyIn] = useState(payment || '');
            const [bonusIn, setBonusIn] = useState(bonus || '');

            const [templateId, setTemplateId] = useState(shift?.templateId || null);

            const handleTemplateSelect = (template) => {
                setHours(template.hours);
                setRate(template.rate);
                setColor(template.color);
                setNote(template.name);
                setTemplateId(template.id);
            };

            if (!show) return null;

            const handleSave = () => {
                onSave(date, 
                    (hours && rate) ? { 
                        hours: Number(hours), 
                        rate: Number(rate), 
                        note, 
                        color,
                        templateId 
                    } : null,
                    moneyIn ? Number(moneyIn) : null,
                    bonusIn ? Number(bonusIn) : null
                );
                onClose();
            };
            
            const earned = (Number(hours) || 0) * (Number(rate) || 0);

            return (
                <div className="fixed inset-0 bg-black/50 flex items-end justify-center z-50" onClick={onClose}>
                    <div 
                        className="bg-white dark:bg-gray-800 w-full max-w-lg rounded-t-3xl p-6 animate-slide-up max-h-[90vh] overflow-y-auto"
                        onClick={e => e.stopPropagation()}
                    >
                        <div className="flex justify-between items-center mb-4">
                            <h2 className="text-xl font-bold text-gray-900 dark:text-white">{date}</h2>
                            <button onClick={onClose} className="text-gray-400 hover:text-gray-600 text-2xl">&times;</button>
                        </div>

                        <div className="mb-6">
                            <h3 className="text-sm font-bold text-gray-400 mb-2 uppercase tracking-wider">Смена</h3>
                            <div className="flex flex-wrap gap-2 mb-3">
                                {templates.map(tpl => (
                                    <button key={tpl.id} onClick={() => handleTemplateSelect(tpl)}
                                        className="px-3 py-1.5 rounded-full text-white text-sm font-medium shadow-sm hover:opacity-90 transition"
                                        style={{ backgroundColor: tpl.color }}>
                                        {tpl.name}
                                    </button>
                                ))}
                            </div>

                            <div className="grid grid-cols-2 gap-3 mb-3">
                                <div>
                                    <label className="block text-xs font-medium text-gray-500 dark:text-gray-400 mb-1">Часы</label>
                                    <input type="number" value={hours} onChange={e => { setHours(e.target.value); setTemplateId(null); }}
                                        className="w-full p-2.5 rounded-xl bg-gray-100 dark:bg-gray-700 border-none outline-none dark:text-white"/>
                                </div>
                                <div>
                                    <label className="block text-xs font-medium text-gray-500 dark:text-gray-400 mb-1">Ставка (₽)</label>
                                    <input type="number" value={rate} onChange={e => { setRate(e.target.value); setTemplateId(null); }}
                                        className="w-full p-2.5 rounded-xl bg-gray-100 dark:bg-gray-700 border-none outline-none dark:text-white"/>
                                </div>
                            </div>
                            
                            <div className="flex items-center gap-3 mb-3">
                                <input type="color" value={color} onChange={e => { setColor(e.target.value); setTemplateId(null); }}
                                    className="w-10 h-10 rounded-lg cursor-pointer border-none bg-transparent"/>
                                <div className="flex-1 h-10 rounded-xl flex items-center justify-center text-white font-bold shadow-inner bg-gray-300 dark:bg-gray-600"
                                    style={{ backgroundColor: earned > 0 ? color : undefined, opacity: earned > 0 ? 1 : 0.5 }}>
                                    {earned.toLocaleString()} ₽
                                </div>
                            </div>
                        </div>

                        <div className="border-t border-gray-200 dark:border-gray-700 pt-4 mb-6">
                            <h3 className="text-sm font-bold text-gray-400 mb-2 uppercase tracking-wider">Премия</h3>
                            <div className="bg-yellow-50 dark:bg-yellow-900/20 p-4 rounded-xl">
                                <label className="block text-xs font-medium text-yellow-700 dark:text-yellow-300 mb-1">Сумма премии</label>
                                <div className="flex items-center gap-2">
                                    <input type="number" value={bonusIn} onChange={e => setBonusIn(e.target.value)} placeholder="0"
                                        className="flex-1 p-2.5 rounded-lg bg-white dark:bg-gray-800 border border-yellow-200 dark:border-yellow-800 outline-none font-bold text-yellow-600"/>
                                    <span className="text-yellow-600 font-bold">₽</span>
                                </div>
                            </div>
                        </div>

                        <div className="border-t border-gray-200 dark:border-gray-700 pt-4 mb-6">
                            <h3 className="text-sm font-bold text-gray-400 mb-2 uppercase tracking-wider">Деньги на руки</h3>
                            <div className="bg-green-50 dark:bg-green-900/20 p-4 rounded-xl">
                                <label className="block text-xs font-medium text-green-700 dark:text-green-300 mb-1">Получено (аванс)</label>
                                <div className="flex items-center gap-2">
                                    <input type="number" value={moneyIn} onChange={e => setMoneyIn(e.target.value)} placeholder="0"
                                        className="flex-1 p-2.5 rounded-lg bg-white dark:bg-gray-800 border border-green-200 dark:border-green-800 outline-none font-bold text-green-600"/>
                                    <span className="text-green-600 font-bold">₽</span>
                                </div>
                            </div>
                        </div>

                        <button onClick={handleSave}
                            className="w-full p-3 rounded-xl text-white font-bold text-lg transition-opacity active:opacity-80 bg-blue-500 hover:bg-blue-600">
                            Сохранить
                        </button>
                    </div>
                </div>
            );
        };

        // --- Компонент: Настройки ---
        const SettingsScreen = ({ settings, setSettings, onClose }) => {
            const [editingId, setEditingId] = useState(null);
            const [form, setForm] = useState({ name: '', hours: 8, rate: 500, color: '#3b82f6' });
            
            const fileInputRef = useRef(null);

            const resetForm = () => { setForm({ name: '', hours: 8, rate: 500, color: '#3b82f6' }); setEditingId(null); };
            const handleEdit = (tpl) => { 
                setForm({ name: tpl.name, hours: tpl.hours, rate: tpl.rate, color: tpl.color }); 
                setEditingId(tpl.id); 
            };

            const handleSaveTemplate = () => {
                if (!form.name) return;
                const payload = { ...form, hours: Number(form.hours), rate: Number(form.rate) };
                
                setSettings(prev => {
                    let newTemplates;
                    const newShifts = { ...prev.shifts };

                    if (editingId) {
                        newTemplates = prev.templates.map(t => t.id === editingId ? { ...t, ...payload, id: editingId } : t);
                        Object.keys(newShifts).forEach(date => {
                            if (newShifts[date].templateId === editingId) {
                                newShifts[date] = { ...newShifts[date], color: payload.color, note: payload.name, hours: payload.hours, rate: payload.rate };
                            }
                        });
                    } else {
                        newTemplates = [...prev.templates, { id: Date.now(), ...payload }];
                    }
                    return { ...prev, templates: newTemplates, shifts: newShifts };
                });
                resetForm();
            };

            const deleteTemplate = (id) => {
                setSettings(prev => ({ ...prev, templates: prev.templates.filter(t => t.id !== id) }));
                if (editingId === id) resetForm();
            };

            // --- Логика Экспорта (Файл) ---
            const handleExport = () => {
                const dataStr = JSON.stringify(settings, null, 2);
                const blob = new Blob([dataStr], { type: "application/json" });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `shift_backup_${new Date().toISOString().slice(0,10)}.json`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            };

            const handleImportClick = () => fileInputRef.current.click();

            const handleFileChange = (event) => {
                const file = event.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const importedData = JSON.parse(e.target.result);
                        if (importedData.shifts && importedData.templates) {
                            if (window.confirm("Загрузить данные из файла? Текущие данные будут заменены.")) {
                                setSettings(importedData);
                                alert("Данные успешно загружены!");
                            }
                        } else alert("Неверный формат файла.");
                    } catch (err) { alert("Ошибка чтения файла."); }
                };
                reader.readAsText(file);
                event.target.value = null;
            };

            const handleClearData = () => {
                if (window.confirm("Вы уверены, что хотите удалить все смены и выплаты?\nНастройки и шаблоны сохранятся.")) {
                    setSettings(prev => ({
                        ...prev,
                        shifts: {},
                        payments: {},
                        bonuses: {}
                    }));
                    alert("Данные календаря очищены.");
                }
            };

            return (
                <div className="fixed inset-0 bg-gray-100 dark:bg-gray-900 z-50 flex flex-col">
                    <div className="p-4 border-b dark:border-gray-700 flex justify-between items-center bg-white dark:bg-gray-800 shadow-sm">
                        <h1 className="text-xl font-bold text-gray-900 dark:text-white">Настройки</h1>
                        <button onClick={onClose} className="text-blue-500 font-medium text-lg">Готово</button>
                    </div>

                    <div className="p-4 flex-1 overflow-y-auto scrollbar-hide space-y-6">
                        
                        {/* Резервное копирование */}
                        <div className="bg-white dark:bg-gray-800 p-4 rounded-2xl shadow-sm">
                            <h3 className="font-bold text-gray-800 dark:text-white mb-2">Резервное копирование</h3>
                            
                            <button onClick={handleExport}
                                className="w-full p-3 rounded-xl font-medium text-white bg-green-500 hover:bg-green-600 transition text-sm mb-2">
                                📥 Сохранить в файл
                            </button>

                            <button onClick={handleImportClick}
                                className="w-full p-3 rounded-xl font-medium text-blue-600 bg-blue-100 dark:bg-blue-900/50 dark:text-blue-300 hover:bg-blue-200 dark:hover:bg-blue-900 transition text-sm">
                                📤 Загрузить из файла
                            </button>
                            <input type="file" ref={fileInputRef} onChange={handleFileChange} accept=".json" className="hidden" />
                        </div>

                        {/* Налоги */}
                        <div className="bg-white dark:bg-gray-800 p-4 rounded-2xl shadow-sm">
                            <h3 className="font-bold text-gray-800 dark:text-white mb-2">Налоги</h3>
                            <div className="flex items-center gap-2">
                                <span className="text-sm dark:text-gray-300">Налог (НДФЛ):</span>
                                <input type="number" min="0" max="100" value={settings.tax}
                                    onChange={e => setSettings(prev => ({ ...prev, tax: Number(e.target.value) }))}
                                    className="w-16 p-2 text-center rounded-lg bg-gray-100 dark:bg-gray-700 font-bold dark:text-white border-none"/>
                                <span className="text-sm dark:text-gray-300">%</span>
                            </div>
                        </div>

                        {/* Период */}
                        <div className="bg-white dark:bg-gray-800 p-4 rounded-2xl shadow-sm">
                            <h3 className="font-bold text-gray-800 dark:text-white mb-2">Период расчета</h3>
                            <div className="flex items-center gap-2">
                                <span className="text-sm dark:text-gray-300">Начало:</span>
                                <input type="number" min="1" max="28" value={settings.startDay}
                                    onChange={e => setSettings(prev => ({ ...prev, startDay: Number(e.target.value) }))}
                                    className="w-16 p-2 text-center rounded-lg bg-gray-100 dark:bg-gray-700 font-bold dark:text-white border-none"/>
                                <span className="text-sm dark:text-gray-300">число</span>
                            </div>
                        </div>

                        {/* Тема */}
                        <div className="bg-white dark:bg-gray-800 p-4 rounded-2xl shadow-sm">
                            <h3 className="font-bold text-gray-800 dark:text-white mb-3">Оформление</h3>
                            <div className="flex gap-2">
                                <button onClick={() => setSettings(prev => ({ ...prev, theme: 'light' }))}
                                    className={`flex-1 p-3 rounded-xl font-medium transition ${settings.theme === 'light' ? 'bg-blue-500 text-white' : 'bg-gray-200 dark:bg-gray-700 text-gray-700 dark:text-gray-300'}`}>
                                    ☀️ Светлая
                                </button>
                                <button onClick={() => setSettings(prev => ({ ...prev, theme: 'dark' }))}
                                    className={`flex-1 p-3 rounded-xl font-medium transition ${settings.theme === 'dark' ? 'bg-blue-500 text-white' : 'bg-gray-200 dark:bg-gray-700 text-gray-700 dark:text-gray-300'}`}>
                                    🌙 Темная
                                </button>
                            </div>
                        </div>

                        {/* Шаблоны */}
                        <div className="bg-white dark:bg-gray-800 p-4 rounded-2xl shadow-sm">
                            <h3 className="font-bold text-gray-800 dark:text-white mb-3">Шаблоны смен</h3>
                            <div className="space-y-2 mb-4">
                                {settings.templates.map(tpl => (
                                    <div key={tpl.id} className="flex items-center justify-between p-3 rounded-xl bg-gray-50 dark:bg-gray-700/50 group">
                                        <div className="flex items-center gap-3">
                                            <div className="w-5 h-5 rounded-full shadow-inner" style={{ backgroundColor: tpl.color }}></div>
                                            <div>
                                                <div className="font-medium text-gray-900 dark:text-white">{tpl.name}</div>
                                                <div className="text-xs text-gray-500 dark:text-gray-400">{tpl.hours}ч • {tpl.rate}₽/ч</div>
                                            </div>
                                        </div>
                                        <div className="flex gap-2 opacity-50 group-hover:opacity-100 transition">
                                            <button onClick={() => handleEdit(tpl)} className="text-blue-500 text-xs font-medium px-2 py-1 bg-blue-100 dark:bg-blue-900/50 rounded">Изм.</button>
                                            <button onClick={() => deleteTemplate(tpl.id)} className="text-red-500 text-xs font-medium px-2 py-1 bg-red-100 dark:bg-red-900/50 rounded">Удл.</button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                            <div className="border-t dark:border-gray-700 pt-4">
                                <h4 className="text-sm font-medium text-gray-500 dark:text-gray-400 mb-2">{editingId ? 'Редактирование' : 'Новый шаблон'}</h4>
                                <div className="grid grid-cols-2 gap-2 mb-2">
                                    <input placeholder="Название" value={form.name} onChange={e => setForm({...form, name: e.target.value})}
                                        className="col-span-2 p-2 rounded-lg bg-gray-100 dark:bg-gray-700 dark:text-white text-sm border-none outline-none"/>
                                    <input placeholder="Часы" type="number" value={form.hours} onChange={e => setForm({...form, hours: e.target.value})}
                                        className="p-2 rounded-lg bg-gray-100 dark:bg-gray-700 dark:text-white text-sm border-none outline-none"/>
                                    <input placeholder="Ставка" type="number" value={form.rate} onChange={e => setForm({...form, rate: e.target.value})}
                                        className="p-2 rounded-lg bg-gray-100 dark:bg-gray-700 dark:text-white text-sm border-none outline-none"/>
                                </div>
                                <div className="flex gap-2 mb-3">
                                    <input type="color" value={form.color} onChange={e => setForm({...form, color: e.target.value})}
                                        className="w-10 h-10 rounded-lg cursor-pointer border-none bg-transparent"/>
                                    <button onClick={handleSaveTemplate}
                                        className={`flex-1 p-2 rounded-lg font-medium text-white ${editingId ? 'bg-yellow-500 hover:bg-yellow-600' : 'bg-green-500 hover:bg-green-600'}`}>
                                        {editingId ? 'Сохранить' : 'Добавить'}
                                    </button>
                                    {editingId && <button onClick={resetForm} className="p-2 rounded-lg bg-gray-300 dark:bg-gray-600 text-gray-700 dark:text-white text-sm">Отмена</button>}
                                </div>
                            </div>
                        </div>

                        {/* Опасная зона */}
                        <div className="bg-red-50 dark:bg-red-900/10 p-4 rounded-2xl border border-red-200 dark:border-red-800">
                            <h3 className="font-bold text-red-700 dark:text-red-300 mb-2">Опасная зона</h3>
                            <button onClick={handleClearData}
                                className="w-full p-3 rounded-xl font-bold text-white bg-red-500 hover:bg-red-600 transition">
                                Очистить календарь
                            </button>
                            <p className="text-xs text-red-400 mt-2">Удалит все смены, премии и выплаты. Шаблоны останутся.</p>
                        </div>

                    </div>
                </div>
            );
        };

        // --- Основной компонент ---
        const App = () => {
            const [initialized, setInitialized] = useState(false);
            const [settings, setSettings] = useState({
                shifts: {},
                payments: {},
                bonuses: {},
                templates: [
                    { id: 1, name: "День", hours: 8, rate: 500, color: "#3b82f6" },
                    { id: 2, name: "Ночь", hours: 11, rate: 700, color: "#8b5cf6" }
                ],
                startDay: 1,
                theme: 'light',
                tax: 13
            });

            const [selectedDate, setSelectedDate] = useState(null);
            const [showModal, setShowModal] = useState(false);
            const [showSettings, setShowSettings] = useState(false);
            const [periodOffset, setPeriodOffset] = useState(0);

            const [isSelectionMode, setIsSelectionMode] = useState(false);
            const [selectedDates, setSelectedDates] = useState(new Set());

            // Init
            useEffect(() => {
                if (window.Telegram && window.Telegram.WebApp) {
                    const tg = window.Telegram.WebApp;
                    tg.ready();
                    tg.expand();
                }
                const savedData = localStorage.getItem('workShiftsAppDataV12'); // Версия 12
                if (savedData) {
                    try {
                        const parsed = JSON.parse(savedData);
                        if (parsed.templates) parsed.templates = parsed.templates.map(t => ({ ...t, hours: Number(t.hours) || 0, rate: Number(t.rate) || 0 }));
                        if (!parsed.bonuses) parsed.bonuses = {};
                        setSettings(prev => ({ ...prev, ...parsed }));
                    } catch (e) { console.error("Load error", e); }
                }
                setInitialized(true);
            }, []);

            // Save
            useEffect(() => {
                if (initialized) localStorage.setItem('workShiftsAppDataV12', JSON.stringify(settings));
            }, [settings, initialized]);

            // Theme
            useEffect(() => {
                document.body.classList.toggle('dark', settings.theme === 'dark');
            }, [settings.theme]);

            // Period Logic
            const { periodStart, periodEnd, displayTitle } = useMemo(() => {
                const today = new Date();
                const targetMonth = today.getMonth() + periodOffset;
                const year = today.getFullYear();
                const start = new Date(year, targetMonth, settings.startDay);
                const end = new Date(year, targetMonth + 1, settings.startDay - 1);
                return { periodStart: start, periodEnd: end, displayTitle: formatHeader(start, end) };
            }, [periodOffset, settings.startDay]);

            const calendarDays = useMemo(() => {
                const days = [];
                let current = new Date(periodStart);
                const startDayOfWeek = current.getDay();
                const offset = startDayOfWeek === 0 ? 6 : startDayOfWeek - 1;
                for (let i = 0; i < offset; i++) days.push({ type: 'empty' });

                while (current <= periodEnd) {
                    const iso = current.toISOString().split('T')[0];
                    days.push({ type: 'day', date: new Date(current), iso: iso });
                    current.setDate(current.getDate() + 1);
                }
                return days;
            }, [periodStart, periodEnd]);

            // Stats Logic
            const monthStats = useMemo(() => {
                let hours = 0, earned = 0, shiftsCount = 0, totalAdvance = 0, shiftsPassed = 0, totalBonuses = 0;
                const todayIso = new Date().toISOString().split('T')[0];
                
                calendarDays.forEach(day => {
                    if (day.type === 'day') {
                        if (settings.shifts[day.iso]) {
                            const shift = settings.shifts[day.iso];
                            const h = Number(shift.hours) || 0;
                            const r = Number(shift.rate) || 0;
                            hours += h;
                            earned += h * r;
                            shiftsCount++;
                            if (day.iso < todayIso) shiftsPassed++;
                        }
                        if (settings.payments[day.iso]) totalAdvance += Number(settings.payments[day.iso]) || 0;
                        if (settings.bonuses[day.iso]) totalBonuses += Number(settings.bonuses[day.iso]) || 0;
                    }
                });

                const grossTotal = earned + totalBonuses;
                const taxAmount = grossTotal * (settings.tax / 100);
                const netIncome = grossTotal - taxAmount;
                const remaining = netIncome - totalAdvance;

                return { hours, earned, shiftsCount, shiftsPassed, totalAdvance, totalBonuses, taxAmount, netIncome, remaining };
            }, [calendarDays, settings.shifts, settings.payments, settings.bonuses, settings.tax]);

            const handleSaveShift = (date, shiftData, paymentData, bonusData) => {
                setSettings(prev => {
                    const newShifts = { ...prev.shifts };
                    const newPayments = { ...prev.payments };
                    const newBonuses = { ...prev.bonuses };

                    if (shiftData) newShifts[date] = shiftData; else delete newShifts[date];
                    if (paymentData) newPayments[date] = paymentData; else delete newPayments[date];
                    if (bonusData) newBonuses[date] = bonusData; else delete newBonuses[date];

                    return { ...prev, shifts: newShifts, payments: newPayments, bonuses: newBonuses };
                });
            };

            const toggleDateSelection = (iso) => {
                const newSelection = new Set(selectedDates);
                if (newSelection.has(iso)) newSelection.delete(iso); else newSelection.add(iso);
                setSelectedDates(newSelection);
            };

            const applyTemplateToSelection = (template) => {
                if (selectedDates.size === 0) return;
                const shiftData = { hours: Number(template.hours), rate: Number(template.rate), note: template.name, color: template.color, templateId: template.id };
                setSettings(prev => {
                    const newShifts = { ...prev.shifts };
                    selectedDates.forEach(date => { newShifts[date] = shiftData; });
                    return { ...prev, shifts: newShifts };
                });
                setSelectedDates(new Set());
                setIsSelectionMode(false);
            };
            
            const clearSelection = () => { setSelectedDates(new Set()); setIsSelectionMode(false); };

            const weekdays = ['Пн', 'Вт', 'Ср', 'Чт', 'Пт', 'Сб', 'Вс'];

            return (
                <div className="max-w-md mx-auto p-4 relative">
                    {/* Header */}
                    <div className="flex justify-between items-center mb-4">
                        <h1 className="text-xl font-bold text-gray-900 dark:text-white">
                            {isSelectionMode ? `Выбрано: ${selectedDates.size}` : "Мой График"}
                        </h1>
                        <div className="flex gap-2">
                            <button onClick={() => setIsSelectionMode(!isSelectionMode)} 
                                className={`p-2 rounded-full transition ${isSelectionMode ? 'bg-blue-500 text-white' : 'hover:bg-gray-200 dark:hover:bg-gray-700'}`}>
                                {isSelectionMode ? (
                                    <svg xmlns="http://www.w3.org/2000/svg" className="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 13l4 4L19 7" /></svg>
                                ) : (
                                    <svg xmlns="http://www.w3.org/2000/svg" className="h-6 w-6 text-gray-600 dark:text-gray-300" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 6h16M4 10h16M4 14h16M4 18h16" /></svg>
                                )}
                            </button>
                            {!isSelectionMode && (
                                <button onClick={() => setShowSettings(true)} className="p-2 rounded-full hover:bg-gray-200 dark:hover:bg-gray-700 transition">
                                    <svg xmlns="http://www.w3.org/2000/svg" className="h-6 w-6 text-gray-600 dark:text-gray-300" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                    </svg>
                                </button>
                            )}
                        </div>
                    </div>

                    {/* Nav */}
                    <div className="flex justify-between items-center mb-4">
                        <button onClick={() => setPeriodOffset(p => p - 1)} className="p-2 rounded-full hover:bg-gray-200 dark:hover:bg-gray-700 transition">
                            <svg xmlns="http://www.w3.org/2000/svg" className="h-6 w-6 text-gray-700 dark:text-gray-200" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 19l-7-7 7-7" /></svg>
                        </button>
                        <h1 className="text-lg font-bold text-gray-800 dark:text-white">{displayTitle}</h1>
                        <button onClick={() => setPeriodOffset(p => p + 1)} className="p-2 rounded-full hover:bg-gray-200 dark:hover:bg-gray-700 transition">
                            <svg xmlns="http://www.w3.org/2000/svg" className="h-6 w-6 text-gray-700 dark:text-gray-200" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 5l7 7-7 7" /></svg>
                        </button>
                    </div>

                    {/* Weekdays */}
                    <div className="grid grid-cols-7 gap-1 mb-2 text-center text-xs font-medium text-gray-400">
                        {weekdays.map(day => <div key={day} className="py-1">{day}</div>)}
                    </div>

                    {/* Grid */}
                    <div className="grid grid-cols-7 gap-1.5">
                        {calendarDays.map((item, idx) => {
                            if (item.type === 'empty') return <div key={`empty-${idx}`} className="aspect-square"></div>;

                            const { date, iso } = item;
                            const shift = settings.shifts[iso];
                            const payment = settings.payments[iso];
                            const bonus = settings.bonuses[iso];
                            const isToday = new Date().toDateString() === date.toDateString();
                            const isSelected = selectedDates.has(iso);

                            return (
                                <div 
                                    key={iso} 
                                    onClick={() => {
                                        if (isSelectionMode) toggleDateSelection(iso);
                                        else { setSelectedDate(iso); setShowModal(true); }
                                    }}
                                    className={`aspect-square rounded-xl flex flex-col items-center justify-center cursor-pointer transition-all shadow-sm relative overflow-hidden
                                        ${shift ? 'text-white shadow-md' : 'bg-white dark:bg-gray-800 hover:bg-gray-50 dark:hover:bg-gray-700'}
                                        ${isToday ? 'ring-2 ring-offset-1 ring-blue-400 dark:ring-offset-gray-900' : ''}
                                        ${isSelected ? 'day-selected z-10' : ''}`}
                                    style={{ backgroundColor: shift ? shift.color : undefined }}
                                >
                                    <span className="font-bold text-sm">{date.getDate()}</span>
                                    {shift && <span className="text-[10px] opacity-90">{shift.hours}ч</span>}
                                    
                                    {bonus && (
                                        <div className="absolute top-0 left-0 w-3 h-3 bg-yellow-400 rounded-br-full flex items-end justify-start p-0.5">
                                            <span className="text-[8px] text-yellow-900 font-bold">★</span>
                                        </div>
                                    )}

                                    {payment && (
                                        <div className="absolute top-0 right-0 w-3 h-3 bg-green-500 rounded-bl-full flex items-end justify-start p-0.5">
                                            <span className="text-[6px] text-white font-bold">₽</span>
                                        </div>
                                    )}
                                    
                                    {isSelected && (
                                        <div className="absolute inset-0 bg-blue-500/20 flex items-center justify-center">
                                            <div className="w-6 h-6 bg-blue-500 rounded-full flex items-center justify-center text-white shadow-lg border-2 border-white">
                                                <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="3" d="M5 13l4 4L19 7"></path></svg>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            );
                        })}
                    </div>

                    {/* Selection Panel */}
                    {isSelectionMode && (
                        <div className="fixed bottom-0 left-0 right-0 bg-white dark:bg-gray-800 border-t dark:border-gray-700 shadow-lg z-40 p-4 animate-slide-up">
                            <div className="flex justify-between items-center mb-2">
                                <span className="text-sm text-gray-500 dark:text-gray-400">Выберите смену:</span>
                                <button onClick={clearSelection} className="text-xs text-gray-400 hover:text-red-500">Отмена</button>
                            </div>
                            <div className="flex gap-2 overflow-x-auto scrollbar-hide pb-2">
                                {settings.templates.map(tpl => (
                                    <button key={tpl.id} onClick={() => applyTemplateToSelection(tpl)}
                                        className="flex-shrink-0 px-4 py-2 rounded-full text-white font-medium shadow-md hover:opacity-90 transition flex items-center gap-2"
                                        style={{ backgroundColor: tpl.color }}>
                                        <div className="w-3 h-3 rounded-full bg-white/30"></div>
                                        {tpl.name}
                                    </button>
                                ))}
                                {selectedDates.size > 0 && (
                                     <button onClick={() => {
                                        setSettings(prev => {
                                            const newShifts = {...prev.shifts};
                                            selectedDates.forEach(d => delete newShifts[d]);
                                            return {...prev, shifts: newShifts};
                                        });
                                        clearSelection();
                                     }}
                                     className="flex-shrink-0 px-4 py-2 rounded-full bg-red-100 text-red-600 font-medium border border-red-200 dark:bg-red-900/50 dark:text-red-400 dark:border-red-800">
                                        Удалить
                                     </button>
                                )}
                            </div>
                        </div>
                    )}

                    {/* Stats */}
                    {!isSelectionMode && (
                        <div className="mt-6 space-y-4">
                            <div className="grid grid-cols-3 gap-3">
                                <div className="bg-white dark:bg-gray-800 p-3 rounded-2xl shadow-sm text-center">
                                    <div className="text-xl font-bold text-blue-500">{monthStats.hours}</div>
                                    <div className="text-[10px] text-gray-500 dark:text-gray-400 uppercase">Часов</div>
                                </div>
                                <div className="bg-white dark:bg-gray-800 p-3 rounded-2xl shadow-sm text-center">
                                    <div className="text-xl font-bold text-indigo-500">{monthStats.shiftsCount}</div>
                                    <div className="text-[10px] text-gray-500 dark:text-gray-400 uppercase">Смен всего</div>
                                </div>
                                <div className="bg-white dark:bg-gray-800 p-3 rounded-2xl shadow-sm text-center border-2 border-green-200 dark:border-green-700">
                                    <div className="text-xl font-bold text-green-500">{monthStats.shiftsPassed}</div>
                                    <div className="text-[10px] text-gray-500 dark:text-gray-400 uppercase">Отработано</div>
                                </div>
                            </div>

                            <div className="bg-white dark:bg-gray-800 p-4 rounded-2xl shadow-sm">
                                <div className="flex justify-between items-center mb-2">
                                    <span className="text-gray-500 dark:text-gray-400 text-sm">ЗП</span>
                                    <span className="font-bold text-gray-800 dark:text-white">{monthStats.earned.toLocaleString()} ₽</span>
                                </div>
                                <div className="flex justify-between items-center mb-2 text-sm">
                                    <span className="text-gray-400 dark:text-gray-500">Премии</span>
                                    <span className="text-yellow-500 font-medium">+ {monthStats.totalBonuses.toLocaleString()} ₽</span>
                                </div>
                                <div className="flex justify-between items-center mb-2 text-sm">
                                    <span className="text-gray-400 dark:text-gray-500">Налог ({settings.tax}%)</span>
                                    <span className="text-red-400">- {monthStats.taxAmount.toLocaleString()} ₽</span>
                                </div>
                                <div className="border-t dark:border-gray-700 pt-2 mt-2 flex justify-between items-center">
                                    <span className="font-bold text-gray-700 dark:text-gray-300">ЗП после вычетов</span>
                                    <span className="font-bold text-xl text-green-500">{monthStats.netIncome.toLocaleString()} ₽</span>
                                </div>
                            </div>

                            <div className="bg-white dark:bg-gray-800 p-4 rounded-2xl shadow-sm">
                                <div className="flex justify-between items-center mb-2">
                                    <span className="text-gray-500 dark:text-gray-400 text-sm">Получено (Аванс)</span>
                                    <span className="font-bold text-green-600">{monthStats.totalAdvance.toLocaleString()} ₽</span>
                                </div>
                                <div className="border-t dark:border-gray-700 pt-2 mt-2 flex justify-between items-center">
                                    <span className="font-bold text-gray-700 dark:text-gray-300">Остаток к выдаче</span>
                                    <span className="font-bold text-xl text-blue-600">{monthStats.remaining.toLocaleString()} ₽</span>
                                </div>
                            </div>
                        </div>
                    )}

                    {showModal && (
                        <ShiftModal 
                            show={showModal} 
                            onClose={() => setShowModal(false)} 
                            date={selectedDate}
                            shift={settings.shifts[selectedDate]}
                            payment={settings.payments[selectedDate]}
                            bonus={settings.bonuses[selectedDate]}
                            onSave={handleSaveShift}
                            templates={settings.templates}
                        />
                    )}
                    {showSettings && <SettingsScreen settings={settings} setSettings={setSettings} onClose={() => setShowSettings(false)} />}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
