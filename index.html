<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Учет смен</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { primary: '#3b82f6' } } }
        }
    </script>
    
    <style>
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0; padding: 0; height: 100vh; overflow-x: hidden;
            transition: background-color 0.3s, color 0.3s;
        }
        body { background-color: #f3f4f6; color: #111827; }
        body.dark { background-color: #111827; color: #f9fafb; }
        
        .animate-slide-up { animation: slideUp 0.3s ease-out forwards; }
        @keyframes slideUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        
        .sync-status { font-size: 10px; padding: 2px 6px; border-radius: 4px; margin-left: 8px; }
        .sync-ok { background: #d1fae5; color: #065f46; }
        .sync-fail { background: #fee2e2; color: #991b1b; }
        
        input[type="time"]::-webkit-calendar-picker-indicator { filter: invert(0.5); cursor: pointer; }
        .day-selected { box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.5); }
        
        .holiday-marker {
            position: absolute;
            top: 0;
            left: 0;
            width: 0;
            height: 0;
            border-top: 20px solid #ef4444;
            border-right: 20px solid transparent;
        }
    </style>
</head>
<body>
    <div id="root" style="height: 100%; display: flex; align-items: center; justify-content: center;">
        <div style="text-align: center; color: #888;">
            <div style="font-size: 24px; margin-bottom: 10px;">⏳</div>
            <div>Загрузка...</div>
        </div>
    </div>

    <script type="module">
        import React, { useState, useEffect, useMemo } from 'https://esm.sh/react@18.2.0';
        import ReactDOM from 'https://esm.sh/react-dom@18.2.0/client';
        import htm from 'https://esm.sh/htm';
        
        const html = htm.bind(React.createElement);

        // --- Helper: Format Date Local ---
        const getISODate = (date) => {
            const y = date.getFullYear();
            const m = String(date.getMonth() + 1).padStart(2, '0');
            const d = String(date.getDate()).padStart(2, '0');
            return `${y}-${m}-${d}`;
        };

        // --- Calculator Engine v3 (Linear Logic) ---
        const timeToMins = (t) => { if(!t) return 0; const [h, m] = t.split(':').map(Number); return h * 60 + m; };
        const getOverlap = (s1, e1, s2, e2) => Math.max(0, Math.min(e1, e2) - Math.max(s1, s2));

        const calculateShiftStats = (shift, holidaysMap, shiftDateStr) => {
            if (!shift || !shift.startTime || !shift.endTime) return { totalHours: 0, nightHours: 0, dayHours: 0, totalPay: 0 };

            // 1. Linearize Shift
            let sStart = timeToMins(shift.startTime);
            let sEnd = timeToMins(shift.endTime);
            if (sEnd < sStart) sEnd += 1440;
            // Shift is now [sStart, sEnd] on a linear scale where sStart is 0 to 1440
            
            // 2. Linearize Lunch
            let lStart = timeToMins(shift.lunchStart);
            let lEnd = timeToMins(shift.lunchEnd);
            if (lEnd < lStart) lEnd += 1440; // Lunch crosses midnight?
            
            // Align lunch to shift
            // If lunch (e.g. 00:00) is "before" shift start (e.g. 22:00) linearly, it's actually next day's lunch
            if (lStart < sStart) {
                lStart += 1440;
                lEnd += 1440;
            }
            
            const shiftDur = sEnd - sStart;
            const lunchDur = getOverlap(sStart, sEnd, lStart, lEnd);
            const workDur = shiftDur - lunchDur;

            // 3. Setup Night Intervals (Linear)
            // Night definition
            const nStart = timeToMins(shift.nightStart || '22:00');
            const nEnd = timeToMins(shift.nightEnd || '06:00');
            
            // Intervals for "Day 0" (Anchor)
            // Night usually wraps midnight: [N_Start, 1440] and [0, N_End]
            // On linear scale (relative to shift start):
            // Interval A: [N_Start, 1440]
            // Interval B: [1440, 1440 + N_End]
            // But we must handle if N_Start < N_End (e.g. day sleep)
            
            let nightIntervals = [];
            // Case: Night wraps midnight (22:00-06:00)
            if (nStart > nEnd) {
                nightIntervals.push([nStart, 1440]); // Part 1 on anchor day
                nightIntervals.push([1440, 1440 + nEnd]); // Part 2 on next day
            } else {
                // Case: Night is inside day (e.g. 01:00-05:00)
                nightIntervals.push([nStart, nEnd]);
                // If shift crosses midnight, we might need to check next day too
                if (sEnd > 1440) {
                     nightIntervals.push([nStart + 1440, nEnd + 1440]);
                }
            }

            // 4. Calculate Night Minutes
            let nightMins = 0;
            nightIntervals.forEach(int => {
                // Overlap of Shift vs Night Interval
                const rawNight = getOverlap(sStart, sEnd, int[0], int[1]);
                // Overlap of Lunch vs Night Interval
                const lunchNight = getOverlap(lStart, lEnd, int[0], int[1]);
                nightMins += Math.max(0, rawNight - lunchNight);
            });

            const dayMins = workDur - nightMins;

            // 5. Calculate Pay (Split by Holidays)
            let totalPay = 0;
            
            // Helper to process a segment
            const process = (start, end, isHoliday) => {
                const dur = (end - start) - getOverlap(start, end, lStart, lEnd);
                if (dur <= 0) return 0;
                
                let night = 0;
                nightIntervals.forEach(int => {
                    night += Math.max(0, getOverlap(start, end, int[0], int[1]) - getOverlap(lStart, lEnd, int[0], int[1]));
                });
                
                const day = dur - night;
                const rate = Number(shift.rate) || 0;
                const bonus = (Number(shift.nightBonusPercent) || 0) / 100;
                const mult = isHoliday ? 2 : 1;
                
                return (day * rate * mult) + (night * rate * mult * (1 + bonus));
            };

            // Determine Holiday Split
            // Anchor date string
            const anchorDate = new Date(shiftDateStr);
            const nextDate = new Date(shiftDateStr);
            nextDate.setDate(nextDate.getDate() + 1);
            const nextDateStr = getISODate(nextDate);

            const isAnchorHoliday = holidaysMap[shiftDateStr] || false;
            const isNextHoliday = holidaysMap[nextDateStr] || false;

            // Part 1: Anchor Day (0 to 1440)
            const p1End = Math.min(sEnd, 1440);
            totalPay += process(sStart, p1End, isAnchorHoliday);

            // Part 2: Next Day (1440+)
            if (sEnd > 1440) {
                totalPay += process(1440, sEnd, isNextHoliday);
            }

            return {
                totalHours: (workDur / 60).toFixed(1),
                nightHours: (nightMins / 60).toFixed(1),
                dayHours: (dayMins / 60).toFixed(1),
                totalPay: Math.round(totalPay)
            };
        };

        // --- Components ---
        
        const ShiftModal = ({ show, onClose, date, shiftData, paymentData, bonusData, isHoliday, onSave, onDelete, templates }) => {
            const getEmptyForm = () => ({
                startTime: '08:00', endTime: '17:00',
                lunchStart: '12:00', lunchEnd: '13:00',
                rate: 525,
                nightStart: '22:00', nightEnd: '06:00',
                nightBonusPercent: 40,
                color: '#3b82f6',
                note: ''
            });

            const [form, setForm] = useState(getEmptyForm());
            const [payment, setPayment] = useState(0);
            const [bonus, setBonus] = useState(0);
            const [holiday, setHoliday] = useState(false);

            useEffect(() => {
                if (show) {
                    if (shiftData) setForm(shiftData);
                    else setForm(getEmptyForm());
                    setPayment(paymentData || 0);
                    setBonus(bonusData || 0);
                    setHoliday(isHoliday || false);
                }
            }, [show, shiftData, paymentData, bonusData, isHoliday]);

            if (!show) return null;

            const update = (k, v) => setForm(p => ({...p, [k]: v}));
            
            const applyTemplate = (tpl) => {
                setForm(prev => ({
                    ...prev,
                    templateId: tpl.id,
                    startTime: tpl.startTime, endTime: tpl.endTime,
                    lunchStart: tpl.lunchStart, lunchEnd: tpl.lunchEnd,
                    rate: tpl.rate,
                    nightStart: tpl.nightStart, nightEnd: tpl.nightEnd,
                    nightBonusPercent: tpl.nightBonusPercent,
                    color: tpl.color,
                    note: tpl.name
                }));
            };

            const holidaysMap = { [date]: holiday };
            const stats = calculateShiftStats(form, holidaysMap, date);

            const save = () => { 
                onSave(date, form, payment ? Number(payment) : null, bonus ? Number(bonus) : null, holiday); 
                onClose(); 
            };
            
            const handleDelete = () => {
                if(confirm("Удалить смену за этот день?")) {
                    onDelete(date);
                    onClose();
                }
            };

            return html`
                <div className="fixed inset-0 bg-black/50 flex items-end justify-center z-50" onClick=${onClose}>
                    <div className="bg-white dark:bg-gray-800 w-full max-w-lg rounded-t-3xl p-6 animate-slide-up max-h-[95vh] overflow-y-auto" onClick=${(e) => e.stopPropagation()}>
                        <div className="flex justify-between items-center mb-4">
                            <h2 className="text-xl font-bold text-gray-900 dark:text-white">${date}</h2>
                            <button onClick=${onClose} className="text-gray-400 hover:text-gray-600 p-1">
                                <svg xmlns="http://www.w3.org/2000/svg" className="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth=${2} d="M6 18L18 6M6 6l12 12" /></svg>
                            </button>
                        </div>
                        <div className="space-y-4">
                            
                            <!-- Holiday Toggle -->
                            <label className="flex items-center justify-between p-3 bg-red-50 dark:bg-red-900/20 rounded-xl cursor-pointer border border-red-200 dark:border-red-700">
                                <div className="flex flex-col">
                                    <span className="font-medium text-red-700 dark:text-red-300">Праздничный день</span>
                                    <span className="text-[10px] text-red-400">Оплата часов этого дня: x2</span>
                                </div>
                                <input type="checkbox" checked=${holiday} onChange=${(e) => setHoliday(e.target.checked)} className="w-5 h-5 rounded text-red-600"/>
                            </label>

                            <!-- Templates -->
                            <div className="flex flex-wrap gap-2">
                                ${templates.map(tpl => html`
                                    <button key=${tpl.id} onClick=${() => applyTemplate(tpl)}
                                        className="px-3 py-1.5 rounded-full text-white text-sm font-medium shadow-sm hover:opacity-90 transition"
                                        style=${{ backgroundColor: tpl.color }}>${tpl.name}</button>
                                `)}
                            </div>

                            <!-- Time -->
                            <div className="bg-gray-50 dark:bg-gray-700/50 p-3 rounded-xl">
                                <div className="flex justify-between text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">
                                    <span>Смена</span>
                                    <span className="text-xs text-gray-400">Итого: ${stats.totalHours} ч</span>
                                </div>
                                <div className="grid grid-cols-2 gap-2">
                                    <div><label className="text-xs text-gray-500">Начало</label><input type="time" value=${form.startTime} onChange=${(e) => update('startTime', e.target.value)} className="w-full p-2 bg-white dark:bg-gray-800 rounded-lg border dark:border-gray-600 outline-none"/></div>
                                    <div><label className="text-xs text-gray-500">Конец</label><input type="time" value=${form.endTime} onChange=${(e) => update('endTime', e.target.value)} className="w-full p-2 bg-white dark:bg-gray-800 rounded-lg border dark:border-gray-600 outline-none"/></div>
                                </div>
                            </div>
                            <!-- Lunch -->
                            <div className="bg-gray-50 dark:bg-gray-700/50 p-3 rounded-xl">
                                <span className="text-sm font-medium text-gray-700 dark:text-gray-300">Обед</span>
                                <div className="grid grid-cols-2 gap-2 mt-2">
                                    <input type="time" value=${form.lunchStart} onChange=${(e) => update('lunchStart', e.target.value)} className="w-full p-2 bg-white dark:bg-gray-800 rounded-lg border dark:border-gray-600 outline-none"/>
                                    <input type="time" value=${form.lunchEnd} onChange=${(e) => update('lunchEnd', e.target.value)} className="w-full p-2 bg-white dark:bg-gray-800 rounded-lg border dark:border-gray-600 outline-none"/>
                                </div>
                            </div>
                            <!-- Rate -->
                            <div className="flex gap-2">
                                <div className="flex-1 bg-gray-50 dark:bg-gray-700/50 p-3 rounded-xl">
                                    <label className="text-xs text-gray-500">Ставка (₽/ч)</label>
                                    <input type="number" value=${form.rate} onChange=${(e) => update('rate', e.target.value)} className="w-full p-2 bg-white dark:bg-gray-800 rounded-lg border dark:border-gray-600 outline-none font-bold"/>
                                </div>
                            </div>
                            
                            <!-- Night -->
                            <div className="bg-indigo-50 dark:bg-indigo-900/20 p-3 rounded-xl border border-indigo-100 dark:border-indigo-800">
                                <div className="flex justify-between items-center mb-2">
                                    <span className="text-sm font-medium text-indigo-700 dark:text-indigo-300">Ночные</span>
                                    <span className="text-xs text-indigo-500">Ночь: ${stats.nightHours} ч</span>
                                </div>
                                <div className="grid grid-cols-3 gap-2 items-end">
                                    <div><label className="text-xs text-gray-500">С</label><input type="time" value=${form.nightStart} onChange=${(e) => update('nightStart', e.target.value)} className="w-full p-2 bg-white dark:bg-gray-800 rounded-lg border dark:border-gray-600 outline-none"/></div>
                                    <div><label className="text-xs text-gray-500">До</label><input type="time" value=${form.nightEnd} onChange=${(e) => update('nightEnd', e.target.value)} className="w-full p-2 bg-white dark:bg-gray-800 rounded-lg border dark:border-gray-600 outline-none"/></div>
                                    <div><label className="text-xs text-gray-500">Доплата %</label><input type="number" value=${form.nightBonusPercent} onChange=${(e) => update('nightBonusPercent', e.target.value)} className="w-full p-2 bg-white dark:bg-gray-800 rounded-lg border dark:border-gray-600 outline-none"/></div>
                                </div>
                            </div>

                            <!-- FINANCES -->
                            <div className="bg-yellow-50 dark:bg-yellow-900/20 p-3 rounded-xl border border-yellow-200 dark:border-yellow-800">
                                <label className="text-xs font-medium text-yellow-700 dark:text-yellow-300">Премия</label>
                                <div className="flex items-center gap-2 mt-1">
                                    <input type="number" placeholder="0" value=${bonus} onChange=${(e) => setBonus(e.target.value)} className="flex-1 p-2 rounded-lg bg-white dark:bg-gray-800 border dark:border-gray-600 outline-none font-bold text-yellow-600"/>
                                    <span className="text-yellow-600 font-bold">₽</span>
                                </div>
                            </div>

                            <div className="bg-green-50 dark:bg-green-900/20 p-3 rounded-xl border border-green-200 dark:border-green-800">
                                <label className="text-xs font-medium text-green-700 dark:text-green-300">Аванс</label>
                                <div className="flex items-center gap-2 mt-1">
                                    <input type="number" placeholder="0" value=${payment} onChange=${(e) => setPayment(e.target.value)} className="flex-1 p-2 rounded-lg bg-white dark:bg-gray-800 border dark:border-gray-600 outline-none font-bold text-green-600"/>
                                    <span className="text-green-600 font-bold">₽</span>
                                </div>
                            </div>

                            <!-- Total -->
                            <div className="bg-green-50 dark:bg-green-900/20 p-4 rounded-xl text-center border border-green-200 dark:border-green-800">
                                <div className="text-3xl font-bold text-green-600 dark:text-green-400">${stats.totalPay.toLocaleString()} ₽</div>
                                <div className="text-xs text-green-700 dark:text-green-300 mt-1">
                                    Д: ${stats.dayHours}ч + Н: ${stats.nightHours}ч
                                </div>
                            </div>
                            
                            <button onClick=${save} className="w-full p-3 rounded-xl text-white font-bold text-lg bg-blue-500 hover:bg-blue-600 transition">Сохранить</button>
                            
                            ${shiftData && html`
                                <button onClick=${handleDelete} className="w-full p-3 rounded-xl font-bold text-red-500 border-2 border-red-200 dark:border-red-800 hover:bg-red-50 dark:hover:bg-red-900/20 transition mt-2">
                                    Удалить смену
                                </button>
                            `}
                        </div>
                    </div>
                </div>
            `;
        };

        const SettingsScreen = ({ settings, setSettings, onClose }) => {
            // Same settings logic as before...
            const [editingId, setEditingId] = useState(null);
            const [form, setForm] = useState({ name: '', startTime: '08:00', endTime: '17:00', lunchStart: '12:00', lunchEnd: '13:00', rate: 525, nightStart: '22:00', nightEnd: '06:00', nightBonusPercent: 40, color: '#3b82f6' });

            const resetForm = () => { setForm({ name: '', startTime: '08:00', endTime: '17:00', lunchStart: '12:00', lunchEnd: '13:00', rate: 525, nightStart: '22:00', nightEnd: '06:00', nightBonusPercent: 40, color: '#3b82f6' }); setEditingId(null); };
            
            const handleEdit = (tpl) => { setForm(tpl); setEditingId(tpl.id); };

            const handleSave = () => {
                if(!form.name) return;
                setSettings(prev => {
                    let tpls = [...prev.templates];
                    if(editingId) tpls = tpls.map(t => t.id === editingId ? {...form} : t);
                    else tpls.push({ id: Date.now(), ...form });
                    return {...prev, templates: tpls};
                });
                resetForm();
            };

            const handleDelete = (id) => setSettings(prev => ({...prev, templates: prev.templates.filter(t => t.id !== id)}));
            const clear = () => { if(confirm("Очистить график?")) setSettings(p => ({...p, shifts: {}, payments: {}, bonuses: {}, holidays: {}})); };

            return html`
                <div className="fixed inset-0 bg-gray-100 dark:bg-gray-900 z-50 flex flex-col">
                    <div className="p-4 border-b dark:border-gray-700 flex justify-between items-center bg-white dark:bg-gray-800 shadow-sm">
                        <h1 className="text-xl font-bold text-gray-900 dark:text-white">Настройки</h1>
                        <button onClick=${onClose} className="text-blue-500 font-medium text-lg">Готово</button>
                    </div>
                    <div className="p-4 flex-1 overflow-y-auto space-y-4">
                        
                        <div className="bg-white dark:bg-gray-800 p-4 rounded-2xl shadow-sm">
                            <h3 className="font-bold text-lg text-gray-800 dark:text-white mb-2">Шаблоны смен</h3>
                            <div className="space-y-2 mb-4">
                                ${settings.templates.map(tpl => html`
                                    <div key=${tpl.id} className="flex items-center justify-between p-3 rounded-xl bg-gray-50 dark:bg-gray-700/50">
                                        <div className="flex items-center gap-3">
                                            <div className="w-4 h-4 rounded-full" style=${{backgroundColor: tpl.color}}></div>
                                            <div>
                                                <div className="font-medium text-gray-900 dark:text-white">${tpl.name}</div>
                                                <div className="text-xs text-gray-500">${tpl.startTime}-${tpl.endTime} (${tpl.rate}₽/ч)</div>
                                            </div>
                                        </div>
                                        <div className="flex gap-1">
                                            <button onClick=${() => handleEdit(tpl)} className="text-xs bg-blue-100 dark:bg-blue-900/50 text-blue-600 px-2 py-1 rounded">Изм</button>
                                            <button onClick=${() => handleDelete(tpl.id)} className="text-xs bg-red-100 dark:bg-red-900/50 text-red-600 px-2 py-1 rounded">Удл</button>
                                        </div>
                                    </div>
                                `)}
                            </div>
                            
                            <div className="border-t dark:border-gray-700 pt-3 space-y-3">
                                <h4 className="text-sm font-medium text-gray-500">${editingId ? 'Редактирование' : 'Новый шаблон'}</h4>
                                <input placeholder="Название шаблона" value=${form.name} onChange=${(e) => setForm(p => ({...p, name: e.target.value}))} className="w-full p-2 rounded-lg bg-gray-100 dark:bg-gray-700 dark:text-white text-sm"/>
                                <div className="grid grid-cols-2 gap-2">
                                    <div><label className="text-xs text-gray-400">Начало</label><input type="time" value=${form.startTime} onChange=${(e) => setForm(p => ({...p, startTime: e.target.value}))} className="w-full p-2 bg-gray-100 dark:bg-gray-700 dark:text-white rounded-lg"/></div>
                                    <div><label className="text-xs text-gray-400">Конец</label><input type="time" value=${form.endTime} onChange=${(e) => setForm(p => ({...p, endTime: e.target.value}))} className="w-full p-2 bg-gray-100 dark:bg-gray-700 dark:text-white rounded-lg"/></div>
                                </div>
                                <div className="grid grid-cols-2 gap-2">
                                    <div><label className="text-xs text-gray-400">Обед (с)</label><input type="time" value=${form.lunchStart} onChange=${(e) => setForm(p => ({...p, lunchStart: e.target.value}))} className="w-full p-2 bg-gray-100 dark:bg-gray-700 dark:text-white rounded-lg"/></div>
                                    <div><label className="text-xs text-gray-400">Обед (по)</label><input type="time" value=${form.lunchEnd} onChange=${(e) => setForm(p => ({...p, lunchEnd: e.target.value}))} className="w-full p-2 bg-gray-100 dark:bg-gray-700 dark:text-white rounded-lg"/></div>
                                </div>

                                <div className="flex gap-2">
                                    <div className="flex-1"><label className="text-xs text-gray-400">Ставка</label><input type="number" value=${form.rate} onChange=${(e) => setForm(p => ({...p, rate: e.target.value}))} className="w-full p-2 bg-gray-100 dark:bg-gray-700 dark:text-white rounded-lg"/></div>
                                    <div className="flex-1"><label className="text-xs text-gray-400">Цвет</label><input type="color" value=${form.color} onChange=${(e) => setForm(p => ({...p, color: e.target.value}))} className="w-full h-10 rounded-lg cursor-pointer bg-transparent"/></div>
                                </div>

                                <div class="bg-indigo-50 dark:bg-indigo-900/20 p-2 rounded-lg text-xs space-y-2">
                                    <div class="font-medium text-indigo-600">Ночные настройки</div>
                                    <div className="grid grid-cols-3 gap-2">
                                        <input type="time" value=${form.nightStart} onChange=${(e) => setForm(p => ({...p, nightStart: e.target.value}))} className="w-full p-1 bg-white dark:bg-gray-800 rounded border dark:border-gray-700"/>
                                        <input type="time" value=${form.nightEnd} onChange=${(e) => setForm(p => ({...p, nightEnd: e.target.value}))} className="w-full p-1 bg-white dark:bg-gray-800 rounded border dark:border-gray-700"/>
                                        <input type="number" placeholder="%" value=${form.nightBonusPercent} onChange=${(e) => setForm(p => ({...p, nightBonusPercent: e.target.value}))} className="w-full p-1 bg-white dark:bg-gray-800 rounded border dark:border-gray-700"/>
                                    </div>
                                </div>

                                <button onClick=${handleSave} className="w-full mt-2 p-2 rounded-lg text-white font-medium ${editingId ? 'bg-yellow-500' : 'bg-green-500'}">${editingId ? 'Сохранить' : 'Добавить'}</button>
                                ${editingId && html`<button onClick=${resetForm} className="w-full mt-1 p-2 text-gray-500 text-sm">Отмена</button>`}
                            </div>
                        </div>

                        <div className="bg-white dark:bg-gray-800 p-4 rounded-2xl shadow-sm">
                             <h3 className="font-bold text-gray-800 dark:text-white mb-2">Период</h3>
                             <div className="flex items-center gap-2">
                                <span className="text-sm dark:text-gray-300">Начало месяца:</span>
                                <input type="number" min="1" max="28" value=${settings.startDay} onChange=${(e) => setSettings(p => ({...p, startDay: Number(e.target.value)}))} className="w-16 p-2 text-center rounded-lg bg-gray-100 dark:bg-gray-700 font-bold dark:text-white border-none"/>
                            </div>
                        </div>

                         <div className="bg-white dark:bg-gray-800 p-4 rounded-2xl shadow-sm">
                            <h3 className="font-bold text-gray-800 dark:text-white mb-3">Тема</h3>
                            <div className="flex gap-2">
                                <button onClick=${() => setSettings(p => ({...p, theme: 'light'}))} className=${'flex-1 p-3 rounded-xl font-medium transition ' + (settings.theme === 'light' ? 'bg-blue-500 text-white' : 'bg-gray-200 dark:bg-gray-700 text-gray-700 dark:text-gray-300')}>☀️ Светлая</button>
                                <button onClick=${() => setSettings(p => ({...p, theme: 'dark'}))} className=${'flex-1 p-3 rounded-xl font-medium transition ' + (settings.theme === 'dark' ? 'bg-blue-500 text-white' : 'bg-gray-200 dark:bg-gray-700 text-gray-700 dark:text-gray-300')}>🌙 Темная</button>
                            </div>
                        </div>

                        <button onClick=${clear} className="w-full p-3 bg-red-500 text-white rounded-xl font-bold">Очистить график</button>
                    </div>
                </div>
            `;
        };

        // --- Main App ---
        const App = () => {
            const [init, setInit] = useState(false);
            const [settings, setSettings] = useState({
                shifts: {}, 
                payments: {},
                bonuses: {},
                holidays: {},
                templates: [
                    { id: 1, name: "День", startTime: '08:00', endTime: '17:00', lunchStart: '12:00', lunchEnd: '13:00', rate: 525, nightStart: '22:00', nightEnd: '06:00', nightBonusPercent: 40, color: '#3b82f6' },
                    { id: 2, name: "Ночь", startTime: '22:00', endTime: '06:00', lunchStart: '00:00', lunchEnd: '01:00', rate: 525, nightStart: '22:00', nightEnd: '06:00', nightBonusPercent: 40, color: '#8b5cf6' }
                ],
                startDay: 1, theme: 'light', tax: 13
            });
            
            const [sync, setSync] = useState('pending');
            const [selDate, setSelDate] = useState(null);
            const [modal, setModal] = useState(false);
            const [sett, setSett] = useState(false);
            const [offset, setOffset] = useState(0);

            const [isSelectMode, setIsSelectMode] = useState(false);
            const [selectedDates, setSelectedDates] = useState(new Set());

            const KEYS = { CFG: 'v26_cfg', DATA: 'v26_data' }; // Updated version keys
            const tg = window.Telegram?.WebApp;
            
            const load = () => {
                setSync('pending');
                const done = (c, d) => {
                    try {
                        const cfg = c ? JSON.parse(c) : {};
                        const data = d ? JSON.parse(d) : {};
                        setSettings(p => ({
                            ...p, 
                            ...cfg,
                            shifts: data.shifts || {},
                            payments: data.payments || {},
                            bonuses: data.bonuses || {},
                            holidays: data.holidays || {}
                        }));
                        setSync('ok');
                    } catch(e) { console.error(e); setSync('fail'); }
                    setInit(true);
                };
                
                if(tg?.CloudStorage) {
                    tg.CloudStorage.getItems([KEYS.CFG, KEYS.DATA], (e, r) => {
                        if(e) { setSync('fail'); setInit(true); return; }
                        done(r[KEYS.CFG], r[KEYS.DATA]);
                    });
                } else {
                    done(localStorage.getItem(KEYS.CFG), localStorage.getItem(KEYS.DATA));
                }
            };

            const save = (s) => {
                try {
                    const {shifts, payments, bonuses, holidays, ...cfg} = s;
                    const cfgStr = JSON.stringify(cfg);
                    const dataStr = JSON.stringify({shifts, payments, bonuses, holidays});
                    localStorage.setItem(KEYS.CFG, cfgStr);
                    localStorage.setItem(KEYS.DATA, dataStr);
                    if(tg?.CloudStorage) {
                        tg.CloudStorage.setItem(KEYS.CFG, cfgStr);
                        tg.CloudStorage.setItem(KEYS.DATA, dataStr);
                    }
                } catch(e) { console.error("Save error", e); }
            };

            useEffect(() => { if(tg) { tg.ready(); tg.expand(); } load(); 
                const vis = () => document.visibilityState === 'visible' && load();
                document.addEventListener('visibilitychange', vis);
                return () => document.removeEventListener('visibilitychange', vis);
            }, []);

            useEffect(() => { if(init) save(settings); }, [settings, init]);
            useEffect(() => { try { document.body.classList.toggle('dark', settings.theme === 'dark'); } catch(e) {} }, [settings.theme]);

            const { pStart, pEnd, dTitle } = useMemo(() => {
                const t = new Date(); const m = t.getMonth() + offset; const y = t.getFullYear();
                const s = new Date(y, m, settings.startDay); const e = new Date(y, m + 1, settings.startDay - 1);
                const fmt = (a,b) => { const M=["Январь","Февраль","Март","Апрель","Май","Июнь","Июль","Август","Сентябрь","Октябрь","Ноябрь","Декабрь"]; return a.getMonth()===b.getMonth() ? `${M[a.getMonth()]} ${a.getFullYear()}` : `${a.getDate()} ${M[a.getMonth()]} - ${b.getDate()} ${M[b.getMonth()]}`; };
                return { pStart: s, pEnd: e, dTitle: fmt(s, e) };
            }, [offset, settings.startDay]);

            const days = useMemo(() => {
                const d = []; let c = new Date(pStart);
                const off = c.getDay() === 0 ? 6 : c.getDay() - 1;
                for(let i=0; i<off; i++) d.push({type:'e'});
                while(c <= pEnd) {
                    // FIX: Use local components to generate ISO string
                    const iso = getISODate(c);
                    d.push({type:'d', dt: new Date(c), iso: iso });
                    c.setDate(c.getDate()+1);
                }
                return d;
            }, [pStart, pEnd]);

            const stats = useMemo(() => {
                let h=0, gross=0, c=0, ps=0, adv=0, bon=0; 
                const td = getISODate(new Date());
                days.forEach(x => {
                    if(x.type === 'd') {
                        if(settings.shifts[x.iso]) {
                            const s = calculateShiftStats(settings.shifts[x.iso], settings.holidays, x.iso);
                            h += parseFloat(s.totalHours) || 0;
                            gross += s.totalPay || 0;
                            c++;
                            if(x.iso < td) ps++;
                        }
                        if(settings.payments[x.iso]) adv += Number(settings.payments[x.iso]) || 0;
                        if(settings.bonuses[x.iso]) bon += Number(settings.bonuses[x.iso]) || 0;
                    }
                });
                
                const totalGross = gross + bon;
                const tx = totalGross * (settings.tax / 100);
                const net = totalGross - tx;
                const remaining = net - adv;
                
                return { h: h.toFixed(1), gross, c, ps, adv, bon, tx, net, remaining };
            }, [days, settings.shifts, settings.payments, settings.bonuses, settings.holidays, settings.tax]);

            const saveShift = (d, sData, pAmount, bAmount, isHol) => {
                setSettings(p => ({
                    ...p, 
                    shifts: {...p.shifts, [d]: sData},
                    payments: {...p.payments, [d]: pAmount},
                    bonuses: {...p.bonuses, [d]: bAmount},
                    holidays: {...p.holidays, [d]: isHol}
                }));
            };

            const deleteShift = (d) => {
                setSettings(p => {
                    const ns = {...p.shifts}, np = {...p.payments}, nb = {...p.bonuses};
                    delete ns[d]; delete np[d]; delete nb[d];
                    return {...p, shifts: ns, payments: np, bonuses: nb};
                });
            };

            const toggleDate = (iso) => {
                const next = new Set(selectedDates);
                if(next.has(iso)) next.delete(iso); else next.add(iso);
                setSelectedDates(next);
            };

            const applyTemplateToSelection = (tpl) => {
                if(selectedDates.size === 0) return;
                setSettings(p => {
                    const newShifts = {...p.shifts};
                    selectedDates.forEach(d => newShifts[d] = {...tpl, templateId: tpl.id});
                    return {...p, shifts: newShifts};
                });
                setSelectedDates(new Set());
                setIsSelectMode(false);
            };

            const clearSelection = () => { setSelectedDates(new Set()); setIsSelectMode(false); };

            return html`
                <div className="max-w-md mx-auto p-4 relative">
                    <!-- Header -->
                    <div className="flex justify-between items-center mb-4">
                        <div className="flex items-center">
                            <h1 className="text-xl font-bold text-gray-900 dark:text-white">${isSelectMode ? `Выбрано: ${selectedDates.size}` : "Мой График"}</h1>
                            <span className=${'sync-status ' + (sync === 'ok' ? 'sync-ok' : sync === 'fail' ? 'sync-fail' : 'sync-pending')}>${sync === 'ok' ? '☁️' : sync === 'fail' ? '⚠️' : '🔄'}</span>
                        </div>
                        <div className="flex gap-2">
                             <button onClick=${load} className="p-2 rounded-full hover:bg-gray-200 dark:hover:bg-gray-700 transition">
                                <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5 text-gray-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth=${2} d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" /></svg>
                            </button>
                            <button onClick=${() => setIsSelectMode(!isSelectMode)} className=${'p-2 rounded-full transition ' + (isSelectMode ? 'bg-blue-500 text-white' : 'hover:bg-gray-200 dark:hover:bg-gray-700')}>
                                ${isSelectMode ? html`<svg xmlns="http://www.w3.org/2000/svg" className="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth=${2} d="M5 13l4 4L19 7" /></svg>` : html`<svg xmlns="http://www.w3.org/2000/svg" className="h-6 w-6 text-gray-600 dark:text-gray-300" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth=${2} d="M4 6h16M4 10h16M4 14h16M4 18h16" /></svg>`}
                            </button>
                            ${!isSelectMode && html`<button onClick=${() => setSett(true)} className="p-2 rounded-full hover:bg-gray-200 dark:hover:bg-gray-700 transition">
                                <svg xmlns="http://www.w3.org/2000/svg" className="h-6 w-6 text-gray-600 dark:text-gray-300" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth=${2} d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" /><path strokeLinecap="round" strokeLinejoin="round" strokeWidth=${2} d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
                            </button>`}
                        </div>
                    </div>

                    <!-- Nav -->
                    <div className="flex justify-between items-center mb-4">
                        <button onClick=${() => setOffset(o => o - 1)} className="p-2 rounded-full hover:bg-gray-200 dark:hover:bg-gray-700 transition"><svg xmlns="http://www.w3.org/2000/svg" className="h-6 w-6 text-gray-700 dark:text-gray-200" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth=${2} d="M15 19l-7-7 7-7" /></svg></button>
                        <h1 className="text-lg font-bold text-gray-800 dark:text-white">${dTitle}</h1>
                        <button onClick=${() => setOffset(o => o + 1)} className="p-2 rounded-full hover:bg-gray-200 dark:hover:bg-gray-700 transition"><svg xmlns="http://www.w3.org/2000/svg" className="h-6 w-6 text-gray-700 dark:text-gray-200" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth=${2} d="M9 5l7 7-7 7" /></svg></button>
                    </div>

                    <!-- Grid -->
                    <div className="grid grid-cols-7 gap-1 mb-2 text-center text-xs font-medium text-gray-400">
                        ${['Пн', 'Вт', 'Ср', 'Чт', 'Пт', 'Сб', 'Вс'].map(d => html`<div key=${d} className="py-1">${d}</div>`)}
                    </div>
                    <div className="grid grid-cols-7 gap-1.5">
                        ${days.map((item, idx) => {
                            if(item.type === 'e') return html`<div key=${'e'+idx} className="aspect-square"></div>`;
                            const s = settings.shifts[item.iso];
                            const p = settings.payments[item.iso];
                            const b = settings.bonuses[item.iso];
                            const hol = settings.holidays[item.iso];
                            const isTd = getISODate(new Date()) === item.iso;
                            const isSelected = selectedDates.has(item.iso);
                            
                            return html`
                                <div key=${item.iso} onClick=${() => {
                                    if(isSelectMode) toggleDate(item.iso);
                                    else { setSelDate(item.iso); setModal(true); }
                                }}
                                    className=${'aspect-square rounded-xl flex flex-col items-center justify-center cursor-pointer transition-all shadow-sm relative ' + 
                                        (s ? ' text-white shadow-md ' : ' bg-white dark:bg-gray-800 hover:bg-gray-50 dark:hover:bg-gray-700 ') + 
                                        (isTd ? ' ring-2 ring-blue-400 ring-offset-1 dark:ring-offset-gray-900 ' : '') +
                                        (isSelected ? ' day-selected z-10 ' : '')}
                                    style=${{ backgroundColor: s ? s.color : null }}>
                                    
                                    <!-- Holiday Marker -->
                                    ${hol && html`<div className="holiday-marker"></div>`}
                                    
                                    <!-- Payment Marker -->
                                    ${p && html`<div className="absolute top-0 right-0 w-2 h-2 bg-green-500 rounded-bl-full"></div>`}
                                    
                                    <!-- Bonus Marker -->
                                    ${b && html`<div className="absolute bottom-0 right-0 w-2 h-2 bg-yellow-500 rounded-tl-full flex items-center justify-center"><span class="text-[6px] text-white">★</span></div>`}
                                    
                                    <span className="font-bold text-sm">${item.dt.getDate()}</span>
                                    ${s && html`<span className="text-[10px] opacity-90">${calculateShiftStats(s, settings.holidays, item.iso).totalHours}ч</span>`}
                                    
                                    ${isSelected && html`
                                        <div className="absolute inset-0 bg-blue-500/30 flex items-center justify-center">
                                            <div className="w-6 h-6 bg-blue-500 rounded-full flex items-center justify-center text-white shadow-lg border-2 border-white">
                                                <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="3" d="M5 13l4 4L19 7"></path></svg>
                                            </div>
                                        </div>
                                    `}
                                </div>
                            `;
                        })}
                    </div>

                    <!-- Multi-select Panel -->
                    ${isSelectMode && html`
                        <div className="fixed bottom-0 left-0 right-0 bg-white dark:bg-gray-800 border-t dark:border-gray-700 shadow-lg z-40 p-4 animate-slide-up">
                            <div className="flex justify-between items-center mb-2">
                                <span className="text-sm text-gray-500 dark:text-gray-400">Выберите смену:</span>
                                <button onClick=${clearSelection} className="text-xs text-gray-400 hover:text-red-500">Отмена</button>
                            </div>
                            <div className="flex gap-2 overflow-x-auto scrollbar-hide pb-2">
                                ${settings.templates.map(tpl => html`
                                    <button key=${tpl.id} onClick=${() => applyTemplateToSelection(tpl)}
                                        className="flex-shrink-0 px-4 py-2 rounded-full text-white font-medium shadow-md hover:opacity-90 transition flex items-center gap-2"
                                        style=${{ backgroundColor: tpl.color }}>
                                        <div className="w-3 h-3 rounded-full bg-white/30"></div>
                                        ${tpl.name}
                                    </button>
                                `)}
                                ${selectedDates.size > 0 && html`
                                     <button onClick=${() => {
                                        setSettings(p => {
                                            const ns = {...p.shifts}, np = {...p.payments}, nb = {...p.bonuses};
                                            selectedDates.forEach(d => { delete ns[d]; delete np[d]; delete nb[d]; });
                                            return {...p, shifts: ns, payments: np, bonuses: nb};
                                        });
                                        clearSelection();
                                     }}
                                     className="flex-shrink-0 px-4 py-2 rounded-full bg-red-100 text-red-600 font-medium border border-red-200 dark:bg-red-900/50 dark:text-red-400 dark:border-red-800">
                                        Удалить
                                     </button>
                                `}
                            </div>
                        </div>
                    `}

                    <!-- Stats -->
                    ${!isSelectMode && html`
                    <div className="mt-6 space-y-4">
                        <div className="grid grid-cols-3 gap-2 text-center">
                            <div className="bg-white dark:bg-gray-800 p-3 rounded-2xl shadow-sm"><div className="text-xl font-bold text-blue-500">${stats.h}</div><div className="text-[10px] text-gray-500">Часов</div></div>
                            <div className="bg-white dark:bg-gray-800 p-3 rounded-2xl shadow-sm"><div className="text-xl font-bold text-indigo-500">${stats.c}</div><div className="text-[10px] text-gray-500">Смен</div></div>
                            <div className="bg-white dark:bg-gray-800 p-3 rounded-2xl shadow-sm border border-green-200"><div className="text-xl font-bold text-green-500">${stats.ps}</div><div className="text-[10px] text-gray-500">Прошло</div></div>
                        </div>

                        <div className="bg-white dark:bg-gray-800 p-4 rounded-2xl shadow-sm">
                            <div className="flex justify-between mb-1 text-sm"><span className="text-gray-500">Начислено (ЗП)</span><span className="font-bold">${stats.gross.toLocaleString()} ₽</span></div>
                            ${stats.bon > 0 && html`<div className="flex justify-between text-sm text-gray-400"><span>Премии</span><span className="text-yellow-500">+ ${stats.bon.toLocaleString()} ₽</span></div>`}
                            <div className="flex justify-between text-sm text-gray-400"><span>Налог (${settings.tax}%)</span><span class="text-red-400">- ${stats.tx.toLocaleString()} ₽</span></div>
                            <div className="border-t dark:border-gray-700 mt-2 pt-2 flex justify-between items-center">
                                <span className="font-bold text-gray-700 dark:text-gray-300">На руки</span>
                                <span className="font-bold text-xl text-green-500">${stats.net.toLocaleString()} ₽</span>
                            </div>
                        </div>

                        <div className="bg-white dark:bg-gray-800 p-4 rounded-2xl shadow-sm">
                            <div className="flex justify-between mb-1 text-sm"><span className="text-gray-500">Получено (Аванс)</span><span className="font-bold text-green-600">${stats.adv.toLocaleString()} ₽</span></div>
                            <div className="border-t dark:border-gray-700 mt-2 pt-2 flex justify-between items-center">
                                <span className="font-bold text-gray-700 dark:text-gray-300">Остаток к выдаче</span>
                                <span className="font-bold text-xl text-blue-600">${stats.remaining.toLocaleString()} ₽</span>
                            </div>
                        </div>
                    </div>
                    `}

                    ${modal && html`<${ShiftModal} show=${modal} onClose=${() => setModal(false)} date=${selDate} 
                        shiftData=${settings.shifts[selDate]} 
                        paymentData=${settings.payments[selDate]} 
                        bonusData=${settings.bonuses[selDate]} 
                        isHoliday=${settings.holidays[selDate]} 
                        onSave=${saveShift} 
                        onDelete=${deleteShift}
                        templates=${settings.templates} />`}
                    ${sett && html`<${SettingsScreen} settings=${settings} setSettings=${setSettings} onClose=${() => setSett(false)} />`}
                </div>
            `;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(html`<${App} />`);
    </script>
</body>
</html>
