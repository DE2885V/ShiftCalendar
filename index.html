<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Учет смен</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { primary: '#3b82f6' } } }
        }
    </script>
    
    <style>
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 0;
            height: 100vh;
            overflow-x: hidden;
            transition: background-color 0.3s, color 0.3s;
        }
        body { background-color: #f3f4f6; color: #111827; }
        body.dark { background-color: #111827; color: #f9fafb; }
        
        .animate-slide-up { animation: slideUp 0.3s ease-out forwards; }
        @keyframes slideUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        
        .day-selected { box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.5); }
        
        .sync-status { font-size: 10px; padding: 2px 6px; border-radius: 4px; margin-left: 8px; }
        .sync-ok { background: #d1fae5; color: #065f46; }
        .sync-fail { background: #fee2e2; color: #991b1b; }
        .sync-pending { background: #fef3c7; color: #92400e; }
        
        input[type="time"]::-webkit-calendar-picker-indicator { filter: invert(0.5); cursor: pointer; }
    </style>
</head>
<body>
    <div id="root" style="height: 100%; display: flex; align-items: center; justify-content: center;">
        <div style="text-align: center; color: #888;">
            <div style="font-size: 24px; margin-bottom: 10px;">⏳</div>
            <div>Загрузка...</div>
        </div>
    </div>

    <script type="module">
        import React, { useState, useEffect, useMemo } from 'https://esm.sh/react@18.2.0';
        import ReactDOM from 'https://esm.sh/react-dom@18.2.0/client';
        import htm from 'https://esm.sh/htm';
        
        const html = htm.bind(React.createElement);

        // --- Calculator Engine ---
        const timeToMinutes = (timeStr) => {
            if (!timeStr) return 0;
            const [h, m] = timeStr.split(':').map(Number);
            return h * 60 + m;
        };

        // Расчет пересечения двух отрезков времени (в минутах)
        const getOverlapMinutes = (start1, end1, start2, end2) => {
            // start1, end1 - смена (линеаризованная)
            // start2, end2 - ночь (линеаризованная)
            const overlap = Math.max(0, Math.min(end1, end2) - Math.max(start1, start2));
            return overlap;
        };

        const calculateShiftStats = (shift) => {
            if (!shift || !shift.startTime || !shift.endTime) return { totalHours: 0, nightHours: 0, dayHours: 0, totalPay: 0 };

            const start = timeToMinutes(shift.startTime);
            let end = timeToMinutes(shift.endTime);
            
            // Если конец меньше начала, значит смена перешла через полночь
            if (end < start) end += 24 * 60;

            // Обед
            let lunchMinutes = 0;
            let lunchStartLinear = 0;
            let lunchEndLinear = 0;

            if (shift.lunchStart && shift.lunchEnd) {
                let lStart = timeToMinutes(shift.lunchStart);
                let lEnd = timeToMinutes(shift.lunchEnd);
                
                // Линеаризуем обед относительно начала смены или суток
                // Простой вариант: обед тоже может переходить полночь, но чаще всего он в пределах суток.
                // Для надежности приводим к "линейному" времени от 0 до 2880 (48ч)
                // Считаем, что обед в те же сутки, что и начало смены, либо корректируем
                if (lEnd < lStart) lEnd += 24 * 60; // Обед перешел полночь
                
                // Если обед начался до начала смены (маловероятно, но возможно), пока упрощаем: 
                // Обед считается в "абсолютных" минутах суток начала смены.
                // Если смена 23:00-07:00, а обед 00:00-01:00, то lStart (0) < start (1380).
                // Надо добавить 1440 к обеду, если он "вчера" или "завтра"? 
                // Проще: обед всегда в [0, 1440]. Смена [start, end].
                // Если смена захватывает следующий день, обед может быть в [0, end%1440].
                
                // Упрощенная логика для обеда:
                // 1. Обед в первые сутки
                lunchMinutes = getOverlapMinutes(start, end, lStart, lEnd);
                
                // 2. Обед во вторые сутки (если смена > 24ч, редкость, но для точности)
                if (end > 1440) {
                     lunchMinutes += getOverlapMinutes(start, end, lStart + 1440, lEnd + 1440);
                }
            }

            const totalWorkMinutes = (end - start) - lunchMinutes;
            const totalHours = totalWorkMinutes / 60;

            // Ночные часы
            // Ночь задается параметрами, например 22:00 (1320 мин) до 06:00 (360 мин)
            const nStart = timeToMinutes(shift.nightStart || '22:00');
            const nEnd = timeToMinutes(shift.nightEnd || '06:00');
            
            let nightMinutes = 0;

            // Логика: Ночной интервал [N_Start, N_End].
            // Если N_End < N_Start, значит ночь переходит полночь (22:00-06:00).
            // Разбиваем на два интервала: [N_Start, 1440] и [0, N_End].
            
            // Смена [Start, End].

            if (nStart > nEnd) {
                // Ночь переходит полночь
                // Интервал 1: [N_Start, 1440]
                nightMinutes += getOverlapMinutes(start, end, nStart, 1440);
                // Интервал 2: [0, N_End]
                nightMinutes += getOverlapMinutes(start, end, 0, nEnd);
                
                // Если смена длинная и захватывает следующие сутки
                if (end > 1440) {
                     // Интервал 1 следующих суток
                     nightMinutes += getOverlapMinutes(start, end, nStart + 1440, 1440 + 1440);
                     // Интервал 2 следующих суток
                     nightMinutes += getOverlapMinutes(start, end, 0 + 1440, nEnd + 1440);
                }
            } else {
                // Ночь в пределах суток (например, дневной сон?)
                nightMinutes += getOverlapMinutes(start, end, nStart, nEnd);
                if (end > 1440) {
                    nightMinutes += getOverlapMinutes(start, end, nStart + 1440, nEnd + 1440);
                }
            }

            // Вычитаем обед из ночных часов
            // Это автоматически учтено, так как мы вычли lunchMinutes из общего времени,
            // но нам нужно знать, сколько именно ночного времени было в обеде, чтобы корректно считать деньги.
            // Чистые ночные часы = (Валовые ночные минуты) минус (Пересечение обеда и ночи)
            
            // Расчет "чистых" ночных часов для оплаты
            // Валовые ночные мы посчитали выше.
            // Нужно вычесть пересечение обеда и ночи.
            let lunchInNight = 0;
            if (lunchMinutes > 0) {
                 if (nStart > nEnd) {
                    lunchInNight += getOverlapMinutes(timeToMinutes(shift.lunchStart), timeToMinutes(shift.lunchEnd), nStart, 1440);
                    lunchInNight += getOverlapMinutes(timeToMinutes(shift.lunchStart), timeToMinutes(shift.lunchEnd), 0, nEnd);
                 } else {
                    lunchInNight += getOverlapMinutes(timeToMinutes(shift.lunchStart), timeToMinutes(shift.lunchEnd), nStart, nEnd);
                 }
                 // Учет перехода обеда через полночь при расчете пересечения с ночью опустим для простоты,
                 // так как обед обычно днем. Если обед попал в ночь - он вычитается из ночи.
            }
            
            const pureNightMinutes = nightMinutes - lunchInNight;
            const nightHours = pureNightMinutes / 60;
            const dayHours = totalHours - nightHours;

            // Деньги
            const rate = shift.rate || 0;
            const nightBonus = (shift.nightBonusPercent || 0) / 100;
            const isHoliday = shift.isHoliday || false;

            const effectiveRate = isHoliday ? rate * 2 : rate;
            
            const dayPay = dayHours * effectiveRate;
            const nightPay = nightHours * effectiveRate * (1 + nightBonus);
            const totalPay = dayPay + nightPay;

            return {
                totalHours: totalHours.toFixed(1),
                nightHours: nightHours.toFixed(1),
                dayHours: dayHours.toFixed(1),
                totalPay: Math.round(totalPay)
            };
        };

        // --- Components ---
        
        const ShiftModal = ({ show, onClose, date, shiftData, onSave, templates }) => {
            const [form, setForm] = useState({});

            useEffect(() => {
                if (shiftData) {
                    setForm(shiftData);
                } else if (templates && templates.length > 0) {
                    const def = templates[0];
                    setForm({
                        templateId: def.id,
                        startTime: def.startTime || '08:00',
                        endTime: def.endTime || '17:00',
                        lunchStart: def.lunchStart || '12:00',
                        lunchEnd: def.lunchEnd || '13:00',
                        rate: def.rate || 525,
                        nightStart: def.nightStart || '22:00',
                        nightEnd: def.nightEnd || '06:00',
                        nightBonusPercent: def.nightBonusPercent || 40,
                        isHoliday: false,
                        color: def.color || '#3b82f6'
                    });
                }
            }, [show, shiftData, templates]);

            if (!show) return null;

            const handleChange = (key, value) => {
                setForm(prev => ({...prev, [key]: value}));
            };

            const stats = calculateShiftStats(form);

            const handleSave = () => {
                onSave(date, { ...form, ...stats });
                onClose();
            };

            return html`
                <div className="fixed inset-0 bg-black/50 flex items-end justify-center z-50" onClick=${onClose}>
                    <div 
                        className="bg-white dark:bg-gray-800 w-full max-w-lg rounded-t-3xl p-6 animate-slide-up max-h-[95vh] overflow-y-auto"
                        onClick=${(e) => e.stopPropagation()}
                    >
                        <div className="flex justify-between items-center mb-4">
                            <h2 className="text-xl font-bold text-gray-900 dark:text-white">${date}</h2>
                            <button onClick=${onClose} className="text-gray-400 hover:text-gray-600 text-2xl">&times;</button>
                        </div>

                        <div className="space-y-4">
                            <!-- Время смены -->
                            <div className="bg-gray-50 dark:bg-gray-700/50 p-3 rounded-xl">
                                <div className="flex justify-between items-center mb-2">
                                    <span className="text-sm font-medium text-gray-700 dark:text-gray-300">Время смены</span>
                                    <span className="text-xs text-gray-400">Без обеда: ${stats.totalHours} ч.</span>
                                </div>
                                <div className="grid grid-cols-2 gap-2">
                                    <div>
                                        <label className="text-xs text-gray-500">Начало</label>
                                        <input type="time" value=${form.startTime || '08:00'} onChange=${(e) => handleChange('startTime', e.target.value)} className="w-full p-2 bg-white dark:bg-gray-800 rounded-lg border dark:border-gray-600 outline-none"/>
                                    </div>
                                    <div>
                                        <label className="text-xs text-gray-500">Конец</label>
                                        <input type="time" value=${form.endTime || '17:00'} onChange=${(e) => handleChange('endTime', e.target.value)} className="w-full p-2 bg-white dark:bg-gray-800 rounded-lg border dark:border-gray-600 outline-none"/>
                                    </div>
                                </div>
                            </div>

                            <!-- Обед -->
                            <div className="bg-gray-50 dark:bg-gray-700/50 p-3 rounded-xl">
                                <span className="text-sm font-medium text-gray-700 dark:text-gray-300">Обед</span>
                                <div className="grid grid-cols-2 gap-2 mt-2">
                                    <input type="time" value=${form.lunchStart || '12:00'} onChange=${(e) => handleChange('lunchStart', e.target.value)} className="w-full p-2 bg-white dark:bg-gray-800 rounded-lg border dark:border-gray-600 outline-none"/>
                                    <input type="time" value=${form.lunchEnd || '13:00'} onChange=${(e) => handleChange('lunchEnd', e.target.value)} className="w-full p-2 bg-white dark:bg-gray-800 rounded-lg border dark:border-gray-600 outline-none"/>
                                </div>
                            </div>

                            <!-- Ставка и Праздник -->
                            <div className="flex gap-2">
                                <div className="flex-1 bg-gray-50 dark:bg-gray-700/50 p-3 rounded-xl">
                                    <label className="text-xs text-gray-500">Ставка (₽/ч)</label>
                                    <input type="number" value=${form.rate || 525} onChange=${(e) => handleChange('rate', e.target.value)} className="w-full p-2 bg-white dark:bg-gray-800 rounded-lg border dark:border-gray-600 outline-none font-bold"/>
                                </div>
                                <div className="flex items-end">
                                    <label className="flex items-center p-3 bg-yellow-50 dark:bg-yellow-900/30 rounded-xl cursor-pointer h-full">
                                        <input type="checkbox" checked=${form.isHoliday || false} onChange=${(e) => handleChange('isHoliday', e.target.checked)} className="w-5 h-5 text-yellow-500 rounded"/>
                                        <span className="ml-2 text-sm font-medium text-yellow-700 dark:text-yellow-300">Праздник (x2)</span>
                                    </label>
                                </div>
                            </div>

                            <!-- Ночные часы -->
                            <div className="bg-indigo-50 dark:bg-indigo-900/20 p-3 rounded-xl border border-indigo-100 dark:border-indigo-800">
                                <div className="flex justify-between items-center mb-2">
                                    <span className="text-sm font-medium text-indigo-700 dark:text-indigo-300">Ночные часы</span>
                                    <span className="text-xs text-indigo-500">Найдено: ${stats.nightHours} ч.</span>
                                </div>
                                <div className="grid grid-cols-3 gap-2 items-end">
                                    <div>
                                        <label className="text-xs text-gray-500">С</label>
                                        <input type="time" value=${form.nightStart || '22:00'} onChange=${(e) => handleChange('nightStart', e.target.value)} className="w-full p-2 bg-white dark:bg-gray-800 rounded-lg border dark:border-gray-600 outline-none"/>
                                    </div>
                                    <div>
                                        <label className="text-xs text-gray-500">До</label>
                                        <input type="time" value=${form.nightEnd || '06:00'} onChange=${(e) => handleChange('nightEnd', e.target.value)} className="w-full p-2 bg-white dark:bg-gray-800 rounded-lg border dark:border-gray-600 outline-none"/>
                                    </div>
                                    <div>
                                        <label className="text-xs text-gray-500">Доплата %</label>
                                        <input type="number" value=${form.nightBonusPercent || 40} onChange=${(e) => handleChange('nightBonusPercent', e.target.value)} className="w-full p-2 bg-white dark:bg-gray-800 rounded-lg border dark:border-gray-600 outline-none"/>
                                    </div>
                                </div>
                            </div>

                            <!-- Итого -->
                            <div className="bg-green-50 dark:bg-green-900/20 p-4 rounded-xl text-center border border-green-200 dark:border-green-800">
                                <div className="text-3xl font-bold text-green-600 dark:text-green-400">${stats.totalPay.toLocaleString()} ₽</div>
                                <div className="text-xs text-green-700 dark:text-green-300 mt-1">
                                    Дневные: ${stats.dayHours}ч (${Math.round(stats.dayHours * (form.isHoliday ? form.rate * 2 : form.rate))}₽) + Ночные: ${stats.nightHours}ч
                                </div>
                            </div>

                            <button onClick=${handleSave}
                                className="w-full p-3 rounded-xl text-white font-bold text-lg bg-blue-500 hover:bg-blue-600 transition">
                                Сохранить
                            </button>
                        </div>
                    </div>
                </div>
            `;
        };

        // --- Settings Screen ---
        const SettingsScreen = ({ settings, setSettings, onClose }) => {
            // Инициализируем tpl первым шаблоном или пустым объектом
            const [tpl, setTpl] = useState(settings.templates[0] || { id: 1, name: "Смена" });

            // Обновляем tpl при изменении settings извне
            useEffect(() => {
                if (settings.templates[0]) setTpl(settings.templates[0]);
            }, [settings]);

            // Исправленная функция обновления
            const handleUpdate = (key, value) => {
                setTpl(prev => ({...prev, [key]: value}));
            };
            
            const handleSave = () => {
                setSettings(prev => ({...prev, templates: [tpl]}));
                onClose();
            };

            const handleClear = () => {
                 if (confirm("Очистить график?")) {
                     setSettings(prev => ({...prev, shifts: {}, payments: {}, bonuses: {} }));
                 }
            };

            return html`
                <div className="fixed inset-0 bg-gray-100 dark:bg-gray-900 z-50 flex flex-col">
                    <div className="p-4 border-b dark:border-gray-700 flex justify-between items-center bg-white dark:bg-gray-800 shadow-sm">
                        <h1 className="text-xl font-bold text-gray-900 dark:text-white">Настройки</h1>
                        <button onClick=${onClose} className="text-blue-500 font-medium text-lg">Готово</button>
                    </div>
                    <div className="p-4 flex-1 overflow-y-auto space-y-4">
                        
                        <div className="bg-white dark:bg-gray-800 p-4 rounded-2xl shadow-sm space-y-3">
                            <h3 className="font-bold text-lg text-gray-800 dark:text-white">Шаблон смены</h3>
                            <p className="text-xs text-gray-500">Значения по умолчанию для новых смен.</p>
                            
                            <div className="grid grid-cols-2 gap-2">
                                <div>
                                    <label className="text-xs text-gray-500">Начало</label>
                                    <input type="time" value=${tpl.startTime || '08:00'} onChange=${(e) => handleUpdate('startTime', e.target.value)} className="w-full p-2 bg-gray-100 dark:bg-gray-700 rounded-lg dark:text-white"/>
                                </div>
                                <div>
                                    <label className="text-xs text-gray-500">Конец</label>
                                    <input type="time" value=${tpl.endTime || '17:00'} onChange=${(e) => handleUpdate('endTime', e.target.value)} className="w-full p-2 bg-gray-100 dark:bg-gray-700 rounded-lg dark:text-white"/>
                                </div>
                            </div>
                            <div className="grid grid-cols-2 gap-2">
                                <div>
                                    <label className="text-xs text-gray-500">Обед (нач)</label>
                                    <input type="time" value=${tpl.lunchStart || '12:00'} onChange=${(e) => handleUpdate('lunchStart', e.target.value)} className="w-full p-2 bg-gray-100 dark:bg-gray-700 rounded-lg dark:text-white"/>
                                </div>
                                <div>
                                    <label className="text-xs text-gray-500">Обед (кон)</label>
                                    <input type="time" value=${tpl.lunchEnd || '13:00'} onChange=${(e) => handleUpdate('lunchEnd', e.target.value)} className="w-full p-2 bg-gray-100 dark:bg-gray-700 rounded-lg dark:text-white"/>
                                </div>
                            </div>
                            <div>
                                <label className="text-xs text-gray-500">Ставка (₽/ч)</label>
                                <input type="number" value=${tpl.rate || 525} onChange=${(e) => handleUpdate('rate', e.target.value)} className="w-full p-2 bg-gray-100 dark:bg-gray-700 rounded-lg dark:text-white"/>
                            </div>
                            <hr className="dark:border-gray-700"/>
                            <h4 className="font-medium text-sm text-gray-700 dark:text-gray-300">Ночные настройки</h4>
                            <div className="grid grid-cols-3 gap-2">
                                <input type="time" value=${tpl.nightStart || '22:00'} onChange=${(e) => handleUpdate('nightStart', e.target.value)} className="w-full p-2 bg-gray-100 dark:bg-gray-700 rounded-lg dark:text-white text-xs"/>
                                <input type="time" value=${tpl.nightEnd || '06:00'} onChange=${(e) => handleUpdate('nightEnd', e.target.value)} className="w-full p-2 bg-gray-100 dark:bg-gray-700 rounded-lg dark:text-white text-xs"/>
                                <input type="number" placeholder="%" value=${tpl.nightBonusPercent || 40} onChange=${(e) => handleUpdate('nightBonusPercent', e.target.value)} className="w-full p-2 bg-gray-100 dark:bg-gray-700 rounded-lg dark:text-white"/>
                            </div>
                            <div>
                                <label className="text-xs text-gray-500">Цвет</label>
                                <input type="color" value=${tpl.color || '#3b82f6'} onChange=${(e) => handleUpdate('color', e.target.value)} className="w-full h-10 rounded-lg cursor-pointer"/>
                            </div>
                        </div>

                        <div className="bg-white dark:bg-gray-800 p-4 rounded-2xl shadow-sm">
                             <h3 className="font-bold text-gray-800 dark:text-white mb-2">Период расчета</h3>
                             <div className="flex items-center gap-2">
                                <span className="text-sm dark:text-gray-300">Начало месяца:</span>
                                <input type="number" min="1" max="28" value=${settings.startDay} onChange=${(e) => setSettings(prev => ({...prev, startDay: Number(e.target.value)}))} className="w-16 p-2 text-center rounded-lg bg-gray-100 dark:bg-gray-700 font-bold dark:text-white border-none"/>
                            </div>
                        </div>

                         <div className="bg-white dark:bg-gray-800 p-4 rounded-2xl shadow-sm">
                            <h3 className="font-bold text-gray-800 dark:text-white mb-3">Оформление</h3>
                            <div className="flex gap-2">
                                <button onClick=${() => setSettings(prev => ({...prev, theme: 'light'}))} className=${'flex-1 p-3 rounded-xl font-medium transition ' + (settings.theme === 'light' ? 'bg-blue-500 text-white' : 'bg-gray-200 dark:bg-gray-700 text-gray-700 dark:text-gray-300')}>
                                    ☀️ Светлая
                                </button>
                                <button onClick=${() => setSettings(prev => ({...prev, theme: 'dark'}))} className=${'flex-1 p-3 rounded-xl font-medium transition ' + (settings.theme === 'dark' ? 'bg-blue-500 text-white' : 'bg-gray-200 dark:bg-gray-700 text-gray-700 dark:text-gray-300')}>
                                    🌙 Темная
                                </button>
                            </div>
                        </div>

                        <button onClick=${handleSave} className="w-full p-3 bg-green-500 text-white rounded-xl font-bold">Сохранить настройки</button>

                        <div className="bg-red-50 dark:bg-red-900/10 p-4 rounded-2xl border border-red-200 dark:border-red-800">
                            <button onClick=${handleClear} className="w-full p-3 rounded-xl font-bold text-white bg-red-500 hover:bg-red-600 transition">Очистить календарь</button>
                        </div>
                    </div>
                </div>
            `;
        };

        // --- Main App ---
        const App = () => {
            const [initialized, setInitialized] = useState(false);
            const [settings, setSettings] = useState({
                shifts: {}, 
                templates: [{ 
                    id: 1, 
                    name: "Дневная смена", 
                    startTime: '08:00', endTime: '17:00', 
                    lunchStart: '12:00', lunchEnd: '13:00', 
                    rate: 525, 
                    nightStart: '22:00', nightEnd: '06:00', nightBonusPercent: 40, 
                    color: '#3b82f6' 
                }],
                startDay: 1, theme: 'light', tax: 13
            });
            
            const [syncStatus, setSyncStatus] = useState('pending');
            const [selectedDate, setSelectedDate] = useState(null);
            const [showModal, setShowModal] = useState(false);
            const [showSettings, setShowSettings] = useState(false);
            const [periodOffset, setPeriodOffset] = useState(0);

            const KEYS = { CONFIG: 'shifts_config_v18_fix', SHIFTS: 'shifts_data_v18_fix' };
            const tg = window.Telegram?.WebApp;
            
            const parseJson = (str) => { try { return str ? JSON.parse(str) : null; } catch (e) { return null; } };

            const loadData = () => {
                setSyncStatus('pending');
                if (tg?.CloudStorage) {
                    tg.CloudStorage.getItems([KEYS.CONFIG, KEYS.SHIFTS], (error, result) => {
                        if (error) { 
                            console.error("Cloud load error", error);
                            setSyncStatus('fail'); 
                            setInitialized(true); 
                            return; 
                        }
                        const config = parseJson(result[KEYS.CONFIG]);
                        const shifts = parseJson(result[KEYS.SHIFTS]);
                        
                        setSettings(prev => ({
                            ...prev,
                            ...(config || {}),
                            shifts: shifts || {}
                        }));
                        
                        setSyncStatus('ok'); 
                        setInitialized(true);
                    });
                } else {
                    const config = parseJson(localStorage.getItem(KEYS.CONFIG));
                    const shifts = parseJson(localStorage.getItem(KEYS.SHIFTS));
                    setSettings(prev => ({...prev, ...(config || {}), shifts: shifts || {}}));
                    setSyncStatus('ok'); 
                    setInitialized(true);
                }
            };

            const saveData = (newSettings) => {
                setSyncStatus('pending');
                const { shifts, ...config } = newSettings;
                
                const configStr = JSON.stringify(config);
                const shiftsStr = JSON.stringify(shifts);

                localStorage.setItem(KEYS.CONFIG, configStr);
                localStorage.setItem(KEYS.SHIFTS, shiftsStr);

                if (tg?.CloudStorage) {
                    let count = 0;
                    const check = (err) => { if(!err) { count++; if(count===2) setSyncStatus('ok'); } else setSyncStatus('fail'); };
                    tg.CloudStorage.setItem(KEYS.CONFIG, configStr, check);
                    tg.CloudStorage.setItem(KEYS.SHIFTS, shiftsStr, check);
                } else setSyncStatus('ok');
            };

            useEffect(() => {
                if (tg) { tg.ready(); tg.expand(); }
                loadData();
                const onVis = () => document.visibilityState === 'visible' && loadData();
                document.addEventListener('visibilitychange', onVis);
                return () => document.removeEventListener('visibilitychange', onVis);
            }, []);

            useEffect(() => { if(initialized) saveData(settings); }, [settings, initialized]);
            useEffect(() => document.body.classList.toggle('dark', settings.theme === 'dark'), [settings.theme]);

            const { periodStart, periodEnd, displayTitle } = useMemo(() => {
                const today = new Date(); const m = today.getMonth() + periodOffset; const y = today.getFullYear();
                const s = new Date(y, m, settings.startDay); const e = new Date(y, m + 1, settings.startDay - 1);
                return { periodStart: s, periodEnd: e, displayTitle: formatHeader(s, e) };
            }, [periodOffset, settings.startDay]);

            const calendarDays = useMemo(() => {
                const days = []; let cur = new Date(periodStart);
                const off = cur.getDay() === 0 ? 6 : cur.getDay() - 1;
                for(let i=0; i<off; i++) days.push({type:'empty'});
                while(cur <= periodEnd) {
                    days.push({type:'day', date: new Date(cur), iso: cur.toISOString().split('T')[0]});
                    cur.setDate(cur.getDate()+1);
                }
                return days;
            }, [periodStart, periodEnd]);

            const stats = useMemo(() => {
                let h=0, p=0, c=0, b=0, pass=0;
                const today = new Date().toISOString().split('T')[0];
                
                calendarDays.forEach(d => {
                    if(d.type === 'day' && settings.shifts[d.iso]) {
                        const s = settings.shifts[d.iso];
                        h += parseFloat(s.totalHours) || 0;
                        p += s.totalPay || 0;
                        c++;
                        if(d.iso < today) pass++;
                        if(s.isHoliday) b += parseFloat(s.totalHours) || 0;
                    }
                });
                
                const tax = p * (settings.tax / 100);
                return { hours: h.toFixed(1), pay: p, count: c, passed: pass, bonus: b.toFixed(1), tax, net: p - tax };
            }, [calendarDays, settings.shifts, settings.tax]);

            const handleSaveShift = (date, data) => {
                setSettings(prev => ({...prev, shifts: {...prev.shifts, [date]: data}}));
            };

            return html`
                <div className="max-w-md mx-auto p-4 relative">
                    <!-- Header -->
                    <div className="flex justify-between items-center mb-4">
                        <div className="flex items-center">
                            <h1 className="text-xl font-bold text-gray-900 dark:text-white">Мой График</h1>
                            <span className=${'sync-status ' + (syncStatus === 'ok' ? 'sync-ok' : syncStatus === 'fail' ? 'sync-fail' : 'sync-pending')}>
                                ${syncStatus === 'ok' ? '☁️' : syncStatus === 'fail' ? '⚠️' : '🔄'}
                            </span>
                        </div>
                        <div className="flex gap-2">
                             <button onClick=${loadData} className="p-2 rounded-full hover:bg-gray-200 dark:hover:bg-gray-700 transition">
                                <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5 text-gray-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth=${2} d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" /></svg>
                            </button>
                            <button onClick=${() => setShowSettings(true)} className="p-2 rounded-full hover:bg-gray-200 dark:hover:bg-gray-700 transition">
                                <svg xmlns="http://www.w3.org/2000/svg" className="h-6 w-6 text-gray-600 dark:text-gray-300" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth=${2} d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" /><path strokeLinecap="round" strokeLinejoin="round" strokeWidth=${2} d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
                            </button>
                        </div>
                    </div>

                    <!-- Nav -->
                    <div className="flex justify-between items-center mb-4">
                        <button onClick=${() => setPeriodOffset(p => p - 1)} className="p-2 rounded-full hover:bg-gray-200 dark:hover:bg-gray-700 transition">
                            <svg xmlns="http://www.w3.org/2000/svg" className="h-6 w-6 text-gray-700 dark:text-gray-200" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth=${2} d="M15 19l-7-7 7-7" /></svg>
                        </button>
                        <h1 className="text-lg font-bold text-gray-800 dark:text-white">${displayTitle}</h1>
                        <button onClick=${() => setPeriodOffset(p => p + 1)} className="p-2 rounded-full hover:bg-gray-200 dark:hover:bg-gray-700 transition">
                            <svg xmlns="http://www.w3.org/2000/svg" className="h-6 w-6 text-gray-700 dark:text-gray-200" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth=${2} d="M9 5l7 7-7 7" /></svg>
                        </button>
                    </div>

                    <!-- Weekdays -->
                    <div className="grid grid-cols-7 gap-1 mb-2 text-center text-xs font-medium text-gray-400">
                        ${['Пн', 'Вт', 'Ср', 'Чт', 'Пт', 'Сб', 'Вс'].map(d => html`<div key=${d} className="py-1">${d}</div>`)}
                    </div>

                    <!-- Grid -->
                    <div className="grid grid-cols-7 gap-1.5">
                        ${calendarDays.map(item => {
                            if(item.type === 'empty') return html`<div key=${'e'+item.iso} className="aspect-square"></div>`;
                            const s = settings.shifts[item.iso];
                            const isToday = new Date().toDateString() === item.date.toDateString();
                            
                            return html`
                                <div key=${item.iso} 
                                    onClick=${() => { setSelectedDate(item.iso); setShowModal(true); }}
                                    className=${'aspect-square rounded-xl flex flex-col items-center justify-center cursor-pointer transition-all shadow-sm relative ' + 
                                        (s ? ' text-white shadow-md ' : ' bg-white dark:bg-gray-800 hover:bg-gray-50 dark:hover:bg-gray-700 ') + 
                                        (isToday ? ' ring-2 ring-blue-400 ring-offset-1 dark:ring-offset-gray-900 ' : '')}
                                    style=${{ backgroundColor: s ? s.color : null }}>
                                    <span className="font-bold text-sm">${item.date.getDate()}</span>
                                    ${s && html`<span className="text-[10px] opacity-90">${s.totalHours}ч</span>`}
                                    ${s?.isHoliday && html`<div className="absolute top-0 left-0 w-2 h-2 bg-yellow-400 rounded-full"></div>`}
                                </div>
                            `;
                        })}
                    </div>

                    <!-- Stats -->
                    <div className="mt-6 space-y-4">
                        <div className="grid grid-cols-3 gap-2 text-center">
                            <div className="bg-white dark:bg-gray-800 p-3 rounded-2xl shadow-sm">
                                <div className="text-xl font-bold text-blue-500">${stats.hours}</div>
                                <div className="text-[10px] text-gray-500">Часов</div>
                            </div>
                            <div className="bg-white dark:bg-gray-800 p-3 rounded-2xl shadow-sm">
                                <div className="text-xl font-bold text-indigo-500">${stats.count}</div>
                                <div className="text-[10px] text-gray-500">Смен</div>
                            </div>
                            <div className="bg-white dark:bg-gray-800 p-3 rounded-2xl shadow-sm border border-green-200">
                                <div className="text-xl font-bold text-green-500">${stats.passed}</div>
                                <div className="text-[10px] text-gray-500">Прошло</div>
                            </div>
                        </div>

                        <div className="bg-white dark:bg-gray-800 p-4 rounded-2xl shadow-sm">
                            <div className="flex justify-between mb-1 text-sm">
                                <span className="text-gray-500">Начислено (Грязными)</span>
                                <span className="font-bold">${stats.pay.toLocaleString()} ₽</span>
                            </div>
                            <div className="flex justify-between text-sm text-gray-400">
                                <span>Налог (${settings.tax}%)</span>
                                <span class="text-red-400">- ${stats.tax.toLocaleString()} ₽</span>
                            </div>
                            <div className="border-t dark:border-gray-700 mt-2 pt-2 flex justify-between items-center">
                                <span className="font-bold text-gray-700 dark:text-gray-300">На руки</span>
                                <span className="font-bold text-xl text-green-500">${stats.net.toLocaleString()} ₽</span>
                            </div>
                            ${stats.bonus > 0 && html`<div className="text-xs text-yellow-600 mt-1 text-right">(${stats.bonus} ч - праздничные)</div>`}
                        </div>
                    </div>

                    ${showModal && html`<${ShiftModal} show=${showModal} onClose=${() => setShowModal(false)} date=${selectedDate} shiftData=${settings.shifts[selectedDate]} onSave=${handleSaveShift} templates=${settings.templates} />`}
                    ${showSettings && html`<${SettingsScreen} settings=${settings} setSettings=${setSettings} onClose=${() => setShowSettings(false)} />`}
                </div>
            `;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(html`<${App} />`);
    </script>
</body>
</html>
